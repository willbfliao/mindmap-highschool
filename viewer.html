<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>心智圖檢視器</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ===== Markmap core layout ===== */
    #markmap-wrap { width: 100%; height: calc(100vh - 56px); margin-top: 56px; position: relative; }
    #markmap-wrap svg { width: 100%; height: 100%; display: block; }

    /* ===== Markmap dark theme ===== */
    .markmap-node text { font-weight: 500 !important; }
    .markmap-node circle { fill: var(--bg, #0f172a) !important; stroke-width: 2px !important; }
    .markmap-foreign { font-weight: 500 !important; }

    /* ===== Detail Sidebar ===== */
    #detail-sidebar {
      position: fixed; top: 56px; right: 0; bottom: 0;
      width: var(--sidebar-width, 380px);
      max-width: 60vw;
      background: var(--bg-card, #1e293b);
      border-left: 1px solid rgba(255,255,255,0.1);
      z-index: 200;
      display: flex;
      transform: translateX(100%);
      transition: transform 0.3s ease;
      overflow: hidden;
    }
    #detail-sidebar.open { transform: translateX(0); }

    /* Resize handle */
    .sidebar-resize-handle {
      width: 5px; cursor: col-resize;
      background: transparent;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .sidebar-resize-handle:hover,
    .sidebar-resize-handle.dragging { background: var(--accent, #6366f1); }

    .sidebar-inner {
      flex: 1; display: flex; flex-direction: column;
      overflow: hidden; min-width: 0;
    }

    /* Sidebar header */
    .sidebar-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem; border-bottom: 1px solid rgba(255,255,255,0.1);
      flex-shrink: 0;
    }
    .sidebar-header h3 { font-size: 1.1rem; font-weight: 600; margin: 0; }
    .sidebar-header-text { flex: 1; min-width: 0; }
    .sidebar-path {
      font-size: 0.7rem; color: var(--text-muted); opacity: 0.7;
      margin-bottom: 0.15rem; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }
    .sidebar-close {
      background: none; border: none; color: var(--text-muted);
      font-size: 1.5rem; cursor: pointer; padding: 0 0.25rem;
      line-height: 1;
    }
    .sidebar-close:hover { color: var(--text); }

    /* Sidebar tabs */
    .sidebar-tabs {
      display: flex; border-bottom: 1px solid rgba(255,255,255,0.1);
      flex-shrink: 0; overflow-x: auto;
    }
    .sidebar-tab {
      flex: 1; padding: 0.6rem 0.5rem; text-align: center;
      font-size: 0.8rem; cursor: pointer; white-space: nowrap;
      background: none; border: none; border-bottom: 2px solid transparent;
      color: var(--text-muted); transition: color 0.2s, border-color 0.2s;
    }
    .sidebar-tab:hover { color: var(--text); }
    .sidebar-tab.active {
      color: var(--accent, #6366f1);
      border-bottom-color: var(--accent, #6366f1);
    }

    /* Sidebar body */
    .sidebar-body {
      flex: 1; overflow-y: auto; padding: 1rem;
    }
    .sidebar-body .tab-pane { display: none; }
    .sidebar-body .tab-pane.active { display: block; }

    /* Node checkbox in sidebar */
    .sidebar-check-row {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.5rem 1rem;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    .sidebar-check-row input[type="checkbox"] {
      width: 18px; height: 18px; accent-color: var(--success, #10b981);
      cursor: pointer;
    }
    .sidebar-check-row label {
      font-size: 0.85rem; cursor: pointer; color: var(--text-muted);
    }
    .sidebar-check-time {
      margin-left: auto; font-size: 0.75rem; color: var(--text-muted);
      opacity: 0.7;
    }

    /* Sidebar content items */
    .detail-item { margin-bottom: 0.75rem; line-height: 1.7; font-size: 0.9rem; }
    .detail-item strong { color: var(--accent); }
    .detail-item .search-link {
      display: inline-block; margin-left: 0.35rem;
      font-size: 0.75rem; color: var(--text-muted); opacity: 0.5;
      text-decoration: none; vertical-align: middle;
      transition: opacity 0.2s, color 0.2s;
    }
    .detail-item .search-link:hover { opacity: 1; color: var(--accent); }
    .detail-section-title {
      font-size: 0.8rem; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.05em;
      margin: 1rem 0 0.5rem; padding-bottom: 0.25rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .detail-bullet { padding-left: 1rem; margin-bottom: 0.35rem; position: relative; }
    .detail-bullet::before { content: '·'; position: absolute; left: 0; color: var(--text-muted); }
    .detail-bullet-l2 { padding-left: 2rem; margin-bottom: 0.3rem; position: relative; font-size: 0.85em; }
    .detail-bullet-l2::before { content: '–'; position: absolute; left: 1rem; color: var(--text-muted); }
    .detail-bullet-l3 { padding-left: 3rem; margin-bottom: 0.25rem; position: relative; font-size: 0.8em; color: var(--text-muted); }
    .detail-bullet-l3::before { content: '·'; position: absolute; left: 2rem; color: var(--text-muted); }

    /* Quiz inside sidebar */
    .sidebar-question { margin-bottom: 1.25rem; }
    .sidebar-question .q-text { font-size: 0.85rem; margin-bottom: 0.5rem; line-height: 1.6; }
    .sidebar-question .q-year { font-size: 0.7rem; color: var(--accent); margin-bottom: 0.3rem; }
    .sidebar-question .sq-options { list-style: none; padding: 0; }
    .sidebar-question .sq-opt-btn {
      display: block; width: 100%; text-align: left;
      padding: 0.5rem 0.75rem; margin-bottom: 0.3rem;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px; color: var(--text); font-size: 0.8rem;
      cursor: pointer; transition: border-color 0.2s, background 0.2s;
    }
    .sq-opt-btn:hover:not(.sq-disabled) { border-color: var(--accent); background: rgba(99,102,241,0.1); }
    .sq-opt-btn.sq-correct { border-color: var(--success); background: rgba(16,185,129,0.15); }
    .sq-opt-btn.sq-wrong { border-color: #ef4444; background: rgba(239,68,68,0.15); }
    .sq-opt-btn.sq-disabled { cursor: default; }
    .sidebar-question .sq-explanation {
      margin-top: 0.5rem; padding: 0.5rem 0.75rem;
      background: rgba(255,255,255,0.04); border-left: 3px solid var(--accent);
      border-radius: 4px; font-size: 0.8rem; line-height: 1.5;
      display: none;
    }
    .sidebar-question .sq-explanation.show { display: block; }

    /* ===== Formula Card Styles ===== */
    .formula-card {
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .formula-card:last-of-type { border-bottom: none; }
    .formula-title {
      font-size: 0.9rem; font-weight: 600;
      color: var(--accent); margin-bottom: 0.5rem;
    }
    .formula-katex {
      text-align: center; padding: 1rem;
      background: rgba(255,255,255,0.04);
      border-radius: 8px; margin-bottom: 0.75rem;
      overflow-x: auto;
    }
    .formula-table {
      width: 100%; border-collapse: collapse;
      font-size: 0.8rem; margin-bottom: 0.75rem;
    }
    .formula-table th {
      text-align: left; padding: 0.4rem 0.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.15);
      color: var(--text-muted); font-weight: 500;
    }
    .formula-table td {
      padding: 0.4rem 0.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .formula-table td .katex { font-size: 0.95em; }
    .formula-section-title {
      font-size: 0.85rem; font-weight: 600;
      margin: 0.75rem 0 0.4rem;
    }
    .formula-geo {
      font-size: 0.8rem; line-height: 1.6;
      padding-left: 0.5rem; color: var(--text-muted);
    }
    .formula-tip {
      font-size: 0.8rem; padding-left: 1rem;
      margin-bottom: 0.25rem; position: relative;
    }
    .formula-tip::before {
      content: '•'; position: absolute; left: 0; color: var(--accent);
    }

    /* Clickable node indicator */
    .markmap-node.clickable-node { cursor: pointer; }
    .markmap-node.clickable-node .markmap-foreign {
      color: #a5b4fc !important;
    }
    .markmap-node.clickable-node text {
      fill: #a5b4fc !important;
    }
    .markmap-node.clickable-node:hover .markmap-foreign {
      color: #c7d2fe !important;
      text-decoration: underline;
    }
    .markmap-node.clickable-node:hover text {
      fill: #c7d2fe !important;
      text-decoration: underline;
      text-decoration-color: #c7d2fe;
    }
    /* Non-clickable nodes (root & category) dimmer */
    .markmap-node:not(.clickable-node) .markmap-foreign {
      color: rgba(255,255,255,0.6) !important;
    }
    .markmap-node:not(.clickable-node) text {
      fill: rgba(255,255,255,0.6) !important;
    }

    /* Node completion status on mindmap */
    .markmap-node.node-checked circle {
      fill: var(--success, #10b981) !important;
      stroke: var(--success, #10b981) !important;
    }
    .markmap-node.node-checked > text,
    .markmap-node.node-checked foreignObject {
      opacity: 0.6 !important;
    }
    .markmap-node .node-time-label {
      font-size: 10px; fill: var(--success, #10b981);
      opacity: 0.85; pointer-events: none;
      text-decoration: none !important;
    }
    .markmap-node.node-unchecked circle {
      fill: var(--bg, #0f172a) !important;
      stroke-width: 2px !important;
    }

    /* Progress bar in nav */
    .nav-progress {
      display: flex; align-items: center; gap: 0.5rem;
      font-size: 0.8rem; color: var(--text-muted);
    }
    .nav-progress-bar {
      width: 80px; height: 6px; background: rgba(255,255,255,0.1);
      border-radius: 3px; overflow: hidden;
    }
    .nav-progress-fill {
      height: 100%; background: var(--success);
      border-radius: 3px; transition: width 0.3s;
    }

    /* ===== Search Panel ===== */
    .search-container {
      position: relative;
    }
    .search-panel {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      width: 340px;
      background: var(--bg-card);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      z-index: 1000;
      overflow: hidden;
    }
    .search-panel.open { display: block; }
    #search-input {
      width: 100%;
      padding: 12px 14px;
      border: none;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: transparent;
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
      box-sizing: border-box;
    }
    #search-input::placeholder { color: rgba(255,255,255,0.35); }
    .search-results {
      list-style: none;
      margin: 0; padding: 0;
      max-height: 360px;
      overflow-y: auto;
    }
    .search-results li {
      padding: 10px 14px;
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      transition: background 0.15s;
    }
    .search-results li:hover,
    .search-results li.active { background: rgba(99,102,241,0.15); }
    .search-results li:last-child { border-bottom: none; }
    .search-result-text {
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--text);
    }
    .search-result-text mark {
      background: rgba(99,102,241,0.4);
      color: #fff;
      border-radius: 2px;
      padding: 0 1px;
    }
    .search-result-path {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.4);
      margin-top: 2px;
    }
    .search-no-result {
      padding: 16px 14px;
      color: rgba(255,255,255,0.35);
      font-size: 0.85rem;
      text-align: center;
    }
    /* Search highlight on mind map node */
    @keyframes search-pulse {
      0%, 100% { filter: drop-shadow(0 0 6px rgba(99,102,241,0.6)); }
      50% { filter: drop-shadow(0 0 18px rgba(99,102,241,1)); }
    }
    .search-highlight {
      animation: search-pulse 0.6s ease-in-out 3;
    }

    /* ===== Mobile sidebar ===== */
    @media (max-width: 768px) {
      #detail-sidebar { width: 100% !important; max-width: 100vw; }
      .sidebar-resize-handle { display: none; }
      .viewer-nav .topic-title { font-size: 0.85rem; }
      .nav-progress { display: none; }
      .search-panel { width: calc(100vw - 2rem); right: -0.5rem; }
    }
  </style>
</head>
<body>
  <nav class="viewer-nav">
    <a id="back-btn" href="index.html" class="back-btn">← 返回</a>
    <span class="topic-title" id="viewer-title">載入中...</span>
    <div class="nav-progress" id="nav-progress">
      <div class="nav-progress-bar"><div class="nav-progress-fill" id="nav-progress-fill"></div></div>
      <span id="nav-progress-text">0/0</span>
    </div>
    <div class="nav-actions">
      <div class="search-container" id="search-container">
        <button class="btn btn-secondary" id="btn-search">🔍 搜尋</button>
        <div class="search-panel" id="search-panel">
          <input type="text" id="search-input" placeholder="搜尋心智圖節點..." autocomplete="off">
          <ul class="search-results" id="search-results"></ul>
        </div>
      </div>
      <button class="btn btn-secondary" id="btn-quiz">📝 練習題</button>
    </div>
  </nav>

  <div id="markmap-wrap"></div>

  <!-- Detail Sidebar -->
  <aside id="detail-sidebar">
    <div class="sidebar-resize-handle" id="sidebar-resize-handle"></div>
    <div class="sidebar-inner">
      <div class="sidebar-header">
        <div class="sidebar-header-text">
          <div class="sidebar-path" id="sidebar-path"></div>
          <h3 id="sidebar-title">節點詳情</h3>
        </div>
        <button class="sidebar-close" id="sidebar-close">&times;</button>
      </div>
      <div class="sidebar-check-row" id="sidebar-check-row">
        <input type="checkbox" id="sidebar-cb">
        <label for="sidebar-cb">已完成複習</label>
        <span class="sidebar-check-time" id="sidebar-check-time"></span>
      </div>
      <nav class="sidebar-tabs">
        <button class="sidebar-tab active" data-tab="concepts">📘 概念與應用</button>
        <button class="sidebar-tab" data-tab="exam">🎯 考試準備</button>
      </nav>
      <div class="sidebar-body">
        <div class="tab-pane active" id="tab-concepts"></div>
        <div class="tab-pane" id="tab-exam"></div>
      </div>
    </div>
  </aside>

  <!-- Programmatic Markmap CDN -->
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="https://cdn.jsdelivr.net/npm/markmap-lib@0.15/dist/browser/index.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/markmap-view@0.15/dist/browser/index.js"></script>
  <script src="js/app.js?v=2"></script>
  <script>
    (async function() {
      /* ===== Load KaTeX dynamically ===== */
      const katexReady = (async function loadKaTeX() {
        if (typeof katex !== 'undefined') return;
        try {
          const link = document.createElement('link');
          link.rel = 'stylesheet';
          link.href = 'https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css';
          document.head.appendChild(link);
          const code = await fetch('https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js').then(r => r.text());
          (0, eval)(code);
        } catch (e) {
          console.warn('KaTeX load failed:', e);
        }
      })();

      const subjectId = getParam('subject');
      const subId = getParam('sub');
      if (!subjectId) { window.location.href = 'index.html'; return; }

      /* ---------- Load subject metadata ---------- */
      const subjectsData = await loadSubjects();
      const subject = subjectsData.subjects.find(s => s.id === subjectId);
      if (!subject) { window.location.href = 'index.html'; return; }

      let displayTitle = subject.icon + ' ' + subject.title;
      if (subId && subject.subSubjects) {
        const sub = subject.subSubjects.find(s => s.id === subId);
        if (sub) displayTitle = sub.icon + ' ' + sub.title;
      }
      document.title = displayTitle + ' - 心智圖';
      document.getElementById('viewer-title').textContent = displayTitle;
      document.getElementById('back-btn').href = subject.hasSubjects
        ? buildSubjectUrl(subjectId)
        : 'index.html';

      /* ---------- Load topics metadata ---------- */
      let topicsData;
      try {
        topicsData = await loadTopicsFor(subjectId, subId);
      } catch {
        document.getElementById('markmap-wrap').innerHTML =
          '<div class="loading" style="height:80vh">無法載入主題資料</div>';
        return;
      }
      const allTopics = getAllTopics(topicsData);
      const topicTitleToId = {};
      allTopics.forEach(t => { topicTitleToId[t.title] = t.id; });

      /* ---------- Quiz button → pick topic ---------- */
      document.getElementById('btn-quiz').addEventListener('click', () => {
        if (allTopics.length === 1) {
          window.location.href = buildQuizUrl(subjectId, subId, allTopics[0].id);
        } else if (allTopics.length > 0) {
          window.location.href = buildQuizUrl(subjectId, subId, allTopics[0].id);
        }
      });

      /* ---------- Fetch individual topic markdowns in parallel & merge ---------- */
      const contentBase = getContentBase(subjectId, subId);
      let mergedMd = '';
      try {
        const rootTitle = displayTitle.replace(/^[^\s]+\s/, ''); // strip emoji
        if (topicsData.groupByCategory) {
          /* Category-aware merge: root → category → topic (bump headings +2) */
          const catParts = [];
          for (const cat of topicsData.categories) {
            const catName = cat.name.replace(/^[^\s]+\s/, '');
            const fetches = cat.topics.map(topic =>
              fetch(contentBase + '/' + topic.file, { cache: 'no-cache' })
                .then(r => r.ok ? r.text() : null)
                .catch(() => null)
            );
            const results = await Promise.all(fetches);
            const topicMds = results
              .filter(Boolean)
              .map(md => md.replace(/^(#{1,4})\s/gm, (m, hashes) => '##' + hashes + ' '));
            catParts.push('## ' + catName + '\n\n' + topicMds.join('\n\n'));
          }
          mergedMd = '# ' + rootTitle + '\n\n' + catParts.join('\n\n');
        } else {
          /* Flat merge (no categories): root → topic (bump headings +1) */
          const fetches = allTopics.map(topic =>
            fetch(contentBase + '/' + topic.file)
              .then(r => r.ok ? r.text() : null)
              .catch(() => null)
          );
          const results = await Promise.all(fetches);
          const parts = results
            .filter(Boolean)
            .map(md => md.replace(/^(#{1,5})\s/gm, (m, hashes) => '#' + hashes + ' '));
          mergedMd = '# ' + rootTitle + '\n\n' + parts.join('\n\n');
        }
      } catch {
        document.getElementById('markmap-wrap').innerHTML =
          '<div class="loading" style="height:80vh">無法載入心智圖內容</div>';
        return;
      }

      if (!mergedMd.trim()) {
        document.getElementById('markmap-wrap').innerHTML =
          '<div class="loading" style="height:80vh">尚無心智圖內容</div>';
        return;
      }

      /* ---------- Transform markdown → markmap tree ---------- */
      const { Transformer } = window.markmap;
      const { Markmap } = window.markmap;
      const transformer = new Transformer();
      const { root } = transformer.transform(mergedMd);

      /* ---------- Build node ID map for checkboxes & sidebar ---------- */
      const nodeMap = {}; // nodeId → { node, depth, path }
      function buildNodeMap(node, depth, pathParts) {
        const text = (node.content || '').replace(/<[^>]+>/g, '').trim();
        if (depth >= 1 && text) {
          const nodeId = buildNodeKey(subjectId, subId, pathParts.concat(text));
          nodeMap[nodeId] = { node, depth, text, pathParts: pathParts.concat(text) };
          node._nodeId = nodeId;
          node._depth = depth;
          node._plainText = text;
        }
        if (node.children) {
          node.children.forEach(c => buildNodeMap(c, depth + 1, depth >= 1 && text ? pathParts.concat(text) : pathParts));
        }
      }
      buildNodeMap(root, 0, []);

      /* ---------- Render markmap ---------- */
      const wrap = document.getElementById('markmap-wrap');
      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.setAttribute('id', 'mindmap-svg');
      wrap.appendChild(svg);

      const mm = Markmap.create(svg, {
        initialExpandLevel: 2,
        duration: 300,
        maxWidth: 300,
        paddingX: 16,
      }, root);

      /* ---------- Node checkbox progress ---------- */
      function updateProgress() {
        const checkable = Object.keys(nodeMap).filter(id => nodeMap[id].depth >= 2);
        const checked = checkable.filter(id => isNodeChecked(id));
        const text = document.getElementById('nav-progress-text');
        const fill = document.getElementById('nav-progress-fill');
        if (text) text.textContent = checked.length + '/' + checkable.length;
        if (fill) fill.style.width = checkable.length > 0
          ? (checked.length / checkable.length * 100) + '%' : '0%';
      }
      updateProgress();

      /* ---------- Node click → open sidebar ---------- */
      const sidebar = document.getElementById('detail-sidebar');
      const sidebarTitle = document.getElementById('sidebar-title');

      // Preload detail & question data
      const detailsCache = {};
      const questionsCache = {};
      for (const topic of allTopics) {
        // details
        fetch(contentBase + '/details/' + topic.id + '.json')
          .then(r => r.ok ? r.json() : null)
          .then(d => { if (d) detailsCache[topic.id] = d; })
          .catch(() => {});
        // questions
        const qBase = getQuestionBase(subjectId, subId);
        fetch(qBase + '/' + topic.id + '.json')
          .then(r => r.ok ? r.json() : null)
          .then(d => { if (d) questionsCache[topic.id] = d; })
          .catch(() => {});
      }

      // After markmap renders, attach click handlers to nodes
      setTimeout(() => attachNodeClickHandlers(), 500);
      // Re-attach after expand/collapse
      svg.addEventListener('click', () => {
        setTimeout(() => attachNodeClickHandlers(), 350);
      });

      function formatNodeTime(isoStr) {
        if (!isoStr) return '';
        const d = new Date(isoStr);
        return (d.getMonth()+1) + '/' + d.getDate() + ' ' +
          String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
      }

      function applyNodeTimestamp(el, nodeId) {
        // Remove old timestamp label
        el.querySelectorAll('.node-time-label').forEach(t => t.remove());
        const t = getNodeCheckedTime(nodeId);
        if (!t) return;
        const timeStr = '\u2714 ' + formatNodeTime(t);

        // Find the content element to measure its position and size
        const foreign = el.querySelector('foreignObject');
        const nodeText = el.querySelector(':scope > text');
        let xPos = 8, yPos = 20;

        if (foreign) {
          const fx = parseFloat(foreign.getAttribute('x')) || 0;
          const fw = parseFloat(foreign.getAttribute('width')) || 0;
          const fy = parseFloat(foreign.getAttribute('y')) || 0;
          const fh = parseFloat(foreign.getAttribute('height')) || 0;
          xPos = fx + fw + 6;
          yPos = fy + fh / 2 + 4;
        } else if (nodeText) {
          try {
            const bbox = nodeText.getBBox();
            xPos = bbox.x + bbox.width + 6;
            yPos = bbox.y + bbox.height / 2 + 4;
          } catch(e) { /* getBBox can fail if not rendered */ }
        }

        const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        label.classList.add('node-time-label');
        label.setAttribute('x', String(xPos));
        label.setAttribute('y', String(yPos));
        label.textContent = timeStr;
        el.appendChild(label);
      }

      function attachNodeClickHandlers() {
        // Build text→entries lookup to detect duplicates
        const textToEntries = {};
        Object.values(nodeMap).forEach(e => {
          if (e.depth < 2) return;
          if (!textToEntries[e.text]) textToEntries[e.text] = [];
          textToEntries[e.text].push(e);
        });

        svg.querySelectorAll('.markmap-node').forEach(el => {
          const textEl = el.querySelector('text, .markmap-foreign');
          if (!textEl) return;
          const rawText = textEl.textContent.trim();

          // Resolve matching nodeMap entry, disambiguate duplicates by parent
          let entry;
          const candidates = textToEntries[rawText];
          if (!candidates || candidates.length === 0) return;
          if (candidates.length === 1) {
            entry = candidates[0];
          } else {
            // Disambiguate: check parent SVG group's text
            const parentG = el.parentElement && el.parentElement.closest('.markmap-node');
            const parentTextEl = parentG && parentG.querySelector('text, .markmap-foreign');
            const parentText = parentTextEl ? parentTextEl.textContent.trim() : '';
            entry = candidates.find(e => {
              const pPath = e.pathParts;
              return pPath.length >= 2 && pPath[pPath.length - 2] === parentText;
            }) || candidates[0];
          }

          const boundNodeId = entry.node._nodeId;
          el.classList.add('clickable-node');
          el.style.cursor = 'pointer';

          // Apply checked/unchecked visual
          el.dataset.nodeId = boundNodeId;
          if (isNodeChecked(boundNodeId)) {
            el.classList.add('node-checked');
            el.classList.remove('node-unchecked');
          } else {
            el.classList.add('node-unchecked');
            el.classList.remove('node-checked');
          }

          // Add click handler (use flag to avoid duplicates)
          if (!textEl.dataset.bound) {
            textEl.dataset.bound = '1';
            textEl.addEventListener('click', (e) => {
              e.stopPropagation();
              openSidebar(entry);
            });
          }

          // Apply timestamp as separate element (not inside node content)
          applyNodeTimestamp(el, boundNodeId);
        });
      }

      function updateNodeCheckVisuals() {
        svg.querySelectorAll('.markmap-node[data-node-id]').forEach(el => {
          const nodeId = el.dataset.nodeId;
          if (isNodeChecked(nodeId)) {
            el.classList.add('node-checked');
            el.classList.remove('node-unchecked');
          } else {
            el.classList.remove('node-checked');
            el.classList.add('node-unchecked');
          }
          applyNodeTimestamp(el, nodeId);
        });
      }

      function openSidebar(entry) {
        sidebarTitle.textContent = entry.text;
        const pathEl = document.getElementById('sidebar-path');
        const breadcrumb = entry.pathParts.slice(0, -1);
        pathEl.textContent = breadcrumb.length > 0 ? breadcrumb.join(' › ') : '';
        sidebar.classList.add('open');

        // Adjust markmap wrap width
        const sidebarW = sidebar.offsetWidth;
        wrap.style.marginRight = sidebarW + 'px';

        populateSidebar(entry);
      }

      function closeSidebar() {
        sidebar.classList.remove('open');
        wrap.style.marginRight = '0';
      }

      document.getElementById('sidebar-close').addEventListener('click', closeSidebar);

      /* ---------- Sidebar tab switching ---------- */
      document.querySelectorAll('.sidebar-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.remove('active'));
          document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
          tab.classList.add('active');
          document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
        });
      });

      /* ---------- Populate sidebar content ---------- */
      async function populateSidebar(entry) {
        const nodeId = entry.node._nodeId;
        const nodeText = entry.text;
        const detailData = findDetailForNode(nodeText, entry.pathParts);

        // Ensure KaTeX is loaded before rendering formulas
        if (detailData && detailData.formulaDetails) {
          await katexReady;
        }

        // --- Tab 1: 概念與應用 (concepts + associations inline) ---
        const conceptsPane = document.getElementById('tab-concepts');
        conceptsPane.innerHTML = '';
        if (entry.node.children && entry.node.children.length > 0) {
          renderNodeChildrenWithAssociations(entry.node, detailData, conceptsPane, entry.pathParts);
        } else if (detailData && detailData.formulaDetails) {
          renderNodeChildrenWithAssociations(entry.node, detailData, conceptsPane, entry.pathParts);
        } else {
          conceptsPane.innerHTML = '<p class="detail-item" style="color:var(--text-muted)">此節點暫無子項目</p>';
        }

        // Header checkbox
        const cb = document.getElementById('sidebar-cb');
        const timeSpan = document.getElementById('sidebar-check-time');
        cb.checked = isNodeChecked(nodeId);
        function updateCheckTime() {
          const t = getNodeCheckedTime(nodeId);
          if (t) {
            const d = new Date(t);
            timeSpan.textContent = d.getFullYear() + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + String(d.getDate()).padStart(2,'0') + ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
          } else {
            timeSpan.textContent = '';
          }
        }
        updateCheckTime();
        // Remove previous handler if any, then attach new one
        if (cb._handler) cb.removeEventListener('change', cb._handler);
        cb._handler = () => {
          toggleNodeCheck(nodeId);
          updateProgress();
          updateNodeCheckVisuals();
          updateCheckTime();
        };
        cb.addEventListener('change', cb._handler);

        // --- Tab 2: 考試準備 (exam tips + questions) ---
        const examPane = document.getElementById('tab-exam');
        examPane.innerHTML = '';
        // Exam tips first
        if (detailData && detailData.examTips && detailData.examTips.length > 0) {
          const tipsTitle = document.createElement('div');
          tipsTitle.className = 'detail-section-title';
          tipsTitle.textContent = '🎯 考試重點';
          examPane.appendChild(tipsTitle);
          detailData.examTips.forEach(tip => {
            const div = document.createElement('div');
            div.className = 'detail-bullet';
            div.textContent = tip;
            examPane.appendChild(div);
          });
        }
        // Then questions
        const relatedQs = findQuestionsForNode(nodeText, entry.pathParts);
        if (relatedQs.length > 0) {
          const qTitle = document.createElement('div');
          qTitle.className = 'detail-section-title';
          qTitle.textContent = '📝 歷屆考題';
          qTitle.style.marginTop = '1.25rem';
          examPane.appendChild(qTitle);
          relatedQs.forEach(q => renderSidebarQuestion(q, examPane));
        }
        // Show empty state only when both are empty
        if (!examPane.hasChildNodes()) {
          examPane.innerHTML = '<p class="detail-item" style="color:var(--text-muted)">尚無考試相關資料</p>';
        }

        // Reset to first tab
        document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
        document.querySelector('.sidebar-tab[data-tab="concepts"]').classList.add('active');
        document.getElementById('tab-concepts').classList.add('active');
      }

      /* ===== Formula Card Renderer ===== */
      function renderFormulaCard(fd, container) {
        const card = document.createElement('div');
        card.className = 'formula-card';

        // Title
        if (fd.title) {
          const t = document.createElement('div');
          t.className = 'formula-title';
          t.textContent = fd.title;
          card.appendChild(t);
        }

        // KaTeX rendered formula
        if (fd.latex) {
          const katexDiv = document.createElement('div');
          katexDiv.className = 'formula-katex';
          try {
            katex.render(fd.latex, katexDiv, { displayMode: true, throwOnError: false });
          } catch (e) {
            katexDiv.textContent = fd.latex;
          }
          card.appendChild(katexDiv);
        }

        // Symbol table
        if (fd.symbols && fd.symbols.length > 0) {
          const secTitle = document.createElement('div');
          secTitle.className = 'formula-section-title';
          secTitle.textContent = '📋 符號與單位解析';
          card.appendChild(secTitle);

          const table = document.createElement('table');
          table.className = 'formula-table';
          const thead = document.createElement('thead');
          thead.innerHTML = '<tr><th>符號</th><th>物理量名稱</th><th>SI 標準單位</th><th>純量 / 向量</th></tr>';
          table.appendChild(thead);
          const tbody = document.createElement('tbody');
          fd.symbols.forEach(s => {
            const tr = document.createElement('tr');
            // Render symbol with KaTeX
            const tdSym = document.createElement('td');
            try {
              katex.render(s.symbol, tdSym, { throwOnError: false });
            } catch (e) {
              tdSym.textContent = s.symbol;
            }
            const tdName = document.createElement('td');
            tdName.textContent = s.name;
            const tdUnit = document.createElement('td');
            try {
              katex.render(s.unit, tdUnit, { throwOnError: false });
            } catch (e) {
              tdUnit.textContent = s.unit;
            }
            const tdType = document.createElement('td');
            tdType.textContent = s.type;
            tr.appendChild(tdSym);
            tr.appendChild(tdName);
            tr.appendChild(tdUnit);
            tr.appendChild(tdType);
            tbody.appendChild(tr);
          });
          table.appendChild(tbody);
          card.appendChild(table);
        }

        // Geometric meaning
        if (fd.geometricMeaning) {
          const secTitle = document.createElement('div');
          secTitle.className = 'formula-section-title';
          secTitle.textContent = '📐 圖表與幾何意義';
          card.appendChild(secTitle);
          const geo = document.createElement('div');
          geo.className = 'formula-geo';
          geo.textContent = fd.geometricMeaning;
          card.appendChild(geo);
        }

        // Exam tips
        if (fd.examTips && fd.examTips.length > 0) {
          const secTitle = document.createElement('div');
          secTitle.className = 'formula-section-title';
          secTitle.textContent = '🎯 考試常考重點';
          card.appendChild(secTitle);
          fd.examTips.forEach(tip => {
            const div = document.createElement('div');
            div.className = 'formula-tip';
            div.textContent = tip;
            card.appendChild(div);
          });
        }

        container.appendChild(card);
      }

      /* ===== Sidebar Content Renderer ===== */
      function renderNodeChildrenWithAssociations(parentNode, detailData, container, pathParts) {
        const associations = extractAssociations(parentNode);
        if (detailData && detailData.associations) {
          detailData.associations.forEach(a => {
            if (!associations.includes(a)) associations.push(a);
          });
        }
        const pathQuery = (pathParts || []).join(' ');

        // If formulaDetails exist, render formula cards first
        const hasFormulas = detailData && detailData.formulaDetails && detailData.formulaDetails.length > 0;
        if (hasFormulas) {
          detailData.formulaDetails.forEach(fd => renderFormulaCard(fd, container));
        }

        // Recursive child renderer (supports arbitrary depth)
        function renderChildren(node, target, depth, maxDepth) {
          (node.children || []).forEach(child => {
            const text = (child.content || '').replace(/<[^>]+>/g, '').trim();
            if (!text) return;
            if (depth === 0) {
              // Top-level children: bold header with search link
              const div = document.createElement('div');
              div.className = 'detail-item';
              const span = document.createElement('span');
              span.textContent = text;
              if (!hasFormulas) span.style.fontWeight = '600';
              div.appendChild(span);
              const searchQuery = (pathQuery + ' ' + text).trim();
              const searchLink = document.createElement('a');
              searchLink.className = 'search-link';
              searchLink.href = 'https://www.google.com/search?udm=50&q=' + encodeURIComponent(searchQuery);
              searchLink.target = '_blank';
              searchLink.rel = 'noopener noreferrer';
              searchLink.title = 'Google AI 搜尋 ' + searchQuery;
              searchLink.textContent = '🔍';
              div.appendChild(searchLink);
              target.appendChild(div);
            } else {
              // Deeper children: bullets with increasing indent
              const cls = depth === 1 ? 'detail-bullet' : depth === 2 ? 'detail-bullet-l2' : 'detail-bullet-l3';
              const p = document.createElement('div');
              p.className = cls;
              p.textContent = text;
              target.appendChild(p);
            }
            // Recurse if there are deeper children
            if (child.children && child.children.length > 0 && depth < maxDepth) {
              renderChildren(child, target, depth + 1, maxDepth);
            }
          });
        }
        renderChildren(parentNode, container, 0, 4);

        // Append associations at the end of concepts
        if (associations.length > 0) {
          const title = document.createElement('div');
          title.className = 'detail-section-title';
          title.textContent = '💡 生活聯想與應用';
          container.appendChild(title);
          associations.forEach(a => {
            const div = document.createElement('div');
            div.className = 'detail-item';
            div.innerHTML = '💡 ' + escapeHtml(a);
            container.appendChild(div);
          });
        }
      }

      function extractAssociations(node) {
        const results = [];
        function walk(n) {
          const text = (n.content || '').replace(/<[^>]+>/g, '').trim();
          if (text.includes('💡')) {
            results.push(text.replace(/^💡\s*聯想[：:]\s*/, '').replace(/^💡\s*/, ''));
          }
          if (n.children) n.children.forEach(walk);
        }
        walk(node);
        return results;
      }

      function resolveTopicIdFromPath(pathParts) {
        if (!pathParts) return null;
        // Walk pathParts to find the first part that matches a known topic title
        for (const part of pathParts) {
          if (topicTitleToId[part]) return topicTitleToId[part];
        }
        return null;
      }

      function findDetailForNode(nodeText, pathParts) {
        // Try scoped lookup first (avoid cross-topic collision)
        const scopedId = resolveTopicIdFromPath(pathParts);
        if (scopedId && detailsCache[scopedId]) {
          const d = detailsCache[scopedId];
          if (d.nodes && d.nodes[nodeText]) return d.nodes[nodeText];
        }
        // Fallback: search all cached topics
        for (const topicId in detailsCache) {
          const d = detailsCache[topicId];
          if (d.nodes && d.nodes[nodeText]) return d.nodes[nodeText];
        }
        return null;
      }

      function findQuestionsForNode(nodeText, pathParts) {
        const results = [];
        // Try scoped lookup first
        const scopedId = resolveTopicIdFromPath(pathParts);
        if (scopedId && questionsCache[scopedId]) {
          const qd = questionsCache[scopedId];
          if (qd.questions) {
            qd.questions.forEach(q => {
              if (q.tags && q.tags.includes(nodeText)) results.push(q);
            });
          }
          if (results.length > 0) return results;
        }
        // Fallback: search all cached topics
        for (const topicId in questionsCache) {
          const qd = questionsCache[topicId];
          if (!qd.questions) continue;
          qd.questions.forEach(q => {
            if (q.tags && q.tags.includes(nodeText)) results.push(q);
          });
        }
        return results;
      }

      function renderSidebarQuestion(q, container) {
        const div = document.createElement('div');
        div.className = 'sidebar-question';
        div.innerHTML = `
          ${q.year ? '<div class="q-year">' + escapeHtml(String(q.year)) + ' 年學測</div>' : ''}
          <div class="q-text">${escapeHtml(q.text)}</div>
          <ul class="sq-options">
            ${q.options.map((opt, i) => {
              const letter = String.fromCharCode(65 + i);
              return '<li><button class="sq-opt-btn" data-letter="' + letter + '">' + escapeHtml(opt) + '</button></li>';
            }).join('')}
          </ul>
          <div class="sq-explanation">${escapeHtml(q.explanation || '')}</div>
        `;
        const buttons = div.querySelectorAll('.sq-opt-btn');
        const explanation = div.querySelector('.sq-explanation');
        buttons.forEach(btn => {
          btn.addEventListener('click', () => {
            if (btn.classList.contains('sq-disabled')) return;
            buttons.forEach(b => {
              b.classList.add('sq-disabled');
              if (b.dataset.letter === q.answer) b.classList.add('sq-correct');
            });
            if (btn.dataset.letter !== q.answer) btn.classList.add('sq-wrong');
            if (explanation) explanation.classList.add('show');
          });
        });
        container.appendChild(div);
      }

      /* ---------- Sidebar resize drag ---------- */
      const resizeHandle = document.getElementById('sidebar-resize-handle');
      let isResizing = false;
      let startX = 0;
      let startWidth = 0;

      function onResizeStart(e) {
        isResizing = true;
        startX = e.clientX || (e.touches && e.touches[0].clientX) || 0;
        startWidth = sidebar.offsetWidth;
        resizeHandle.classList.add('dragging');
        document.body.style.userSelect = 'none';
        document.body.style.cursor = 'col-resize';
      }

      function onResizeMove(e) {
        if (!isResizing) return;
        const clientX = e.clientX || (e.touches && e.touches[0].clientX) || 0;
        const diff = startX - clientX; // dragging left = wider
        let newWidth = Math.max(280, Math.min(window.innerWidth * 0.6, startWidth + diff));
        sidebar.style.setProperty('--sidebar-width', newWidth + 'px');
        sidebar.style.width = newWidth + 'px';
        wrap.style.marginRight = newWidth + 'px';
      }

      function onResizeEnd() {
        if (!isResizing) return;
        isResizing = false;
        resizeHandle.classList.remove('dragging');
        document.body.style.userSelect = '';
        document.body.style.cursor = '';
        // Persist width preference
        localStorage.setItem(STORAGE_PREFIX + 'sidebar-width', sidebar.offsetWidth);
        requestAnimationFrame(() => mm.fit());
      }

      resizeHandle.addEventListener('mousedown', onResizeStart);
      document.addEventListener('mousemove', onResizeMove);
      document.addEventListener('mouseup', onResizeEnd);
      resizeHandle.addEventListener('touchstart', onResizeStart, { passive: true });
      document.addEventListener('touchmove', onResizeMove, { passive: true });
      document.addEventListener('touchend', onResizeEnd);

      // Restore saved sidebar width
      const savedWidth = localStorage.getItem(STORAGE_PREFIX + 'sidebar-width');
      if (savedWidth) {
        const w = parseInt(savedWidth, 10);
        if (w >= 280 && w <= window.innerWidth * 0.6) {
          sidebar.style.setProperty('--sidebar-width', w + 'px');
          sidebar.style.width = w + 'px';
        }
      }

      /* ===== Search functionality ===== */
      const searchPanel = document.getElementById('search-panel');
      const searchInput = document.getElementById('search-input');
      const searchResults = document.getElementById('search-results');
      const btnSearch = document.getElementById('btn-search');

      function toggleSearch() {
        searchPanel.classList.toggle('open');
        if (searchPanel.classList.contains('open')) {
          searchInput.value = '';
          searchResults.innerHTML = '';
          searchInput.focus();
        }
      }

      btnSearch.addEventListener('click', (e) => {
        e.stopPropagation();
        toggleSearch();
      });

      // Close search panel when clicking outside
      document.addEventListener('click', (e) => {
        if (!searchPanel.classList.contains('open')) return;
        if (!document.getElementById('search-container').contains(e.target)) {
          searchPanel.classList.remove('open');
        }
      });

      // Prevent panel clicks from closing
      searchPanel.addEventListener('click', (e) => e.stopPropagation());

      // Build safe HTML with <mark> highlights (XSS-safe: uses textContent for non-match parts)
      function buildHighlightedEl(text, query) {
        const frag = document.createDocumentFragment();
        if (!query) {
          frag.appendChild(document.createTextNode(text));
          return frag;
        }
        const regex = new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
        const parts = text.split(regex);
        parts.forEach(part => {
          if (part.toLowerCase() === query.toLowerCase()) {
            const mark = document.createElement('mark');
            mark.textContent = part;
            frag.appendChild(mark);
          } else {
            frag.appendChild(document.createTextNode(part));
          }
        });
        return frag;
      }

      // Live search on input (debounced)
      let searchTimer = null;
      searchInput.addEventListener('input', () => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => {
          const query = searchInput.value.trim().toLowerCase();
          searchResults.innerHTML = '';
          if (!query) return;

          const allMatches = Object.values(nodeMap)
            .filter(e => e.text.toLowerCase().includes(query));
          const matches = allMatches.slice(0, 20);

          if (matches.length === 0) {
            searchResults.innerHTML = '<li class="search-no-result">找不到相關節點</li>';
            return;
          }

          matches.forEach(entry => {
            const li = document.createElement('li');
            const textDiv = document.createElement('div');
            textDiv.className = 'search-result-text';
            textDiv.appendChild(buildHighlightedEl(entry.text, query));
            li.appendChild(textDiv);

            const pathText = entry.pathParts.slice(0, -1).join(' › ');
            if (pathText) {
              const pathDiv = document.createElement('div');
              pathDiv.className = 'search-result-path';
              pathDiv.textContent = pathText;
              li.appendChild(pathDiv);
            }

            li.addEventListener('click', () => navigateToNode(entry));
            searchResults.appendChild(li);
          });

          // Show truncation hint
          if (allMatches.length > 20) {
            const hint = document.createElement('li');
            hint.className = 'search-no-result';
            hint.textContent = '顯示前 20 筆，共 ' + allMatches.length + ' 筆結果';
            searchResults.appendChild(hint);
          }
        }, 150);
      });

      // Keyboard navigation in search results
      searchInput.addEventListener('keydown', (e) => {
        const items = searchResults.querySelectorAll('li:not(.search-no-result)');
        if (!items.length) return;
        const current = searchResults.querySelector('li.active');
        let idx = current ? Array.from(items).indexOf(current) : -1;

        if (e.key === 'ArrowDown') {
          e.preventDefault();
          if (current) current.classList.remove('active');
          idx = (idx + 1) % items.length;
          items[idx].classList.add('active');
          items[idx].scrollIntoView({ block: 'nearest' });
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          if (current) current.classList.remove('active');
          idx = idx <= 0 ? items.length - 1 : idx - 1;
          items[idx].classList.add('active');
          items[idx].scrollIntoView({ block: 'nearest' });
        } else if (e.key === 'Enter') {
          e.preventDefault();
          if (current) current.click();
          else if (items.length > 0) items[0].click();
        }
      });

      // Unfold all ancestors of a target node in the markmap tree
      function unfoldToNode(targetNode, currentNode) {
        if (currentNode === targetNode) return true;
        if (!currentNode.children) return false;
        for (const child of currentNode.children) {
          if (unfoldToNode(targetNode, child)) {
            if (!currentNode.payload) currentNode.payload = {};
            currentNode.payload.fold = 0;
            return true;
          }
        }
        return false;
      }

      // Find the SVG DOM element matching a node's text
      function findSvgNodeElement(text, pathParts) {
        const allNodes = svg.querySelectorAll('.markmap-node');
        let match = null;
        allNodes.forEach(el => {
          const textEl = el.querySelector('text, .markmap-foreign');
          if (!textEl) return;
          if (textEl.textContent.trim() === text) {
            if (!match) match = el;
            // Disambiguate by parent
            if (pathParts && pathParts.length >= 2) {
              const parentG = el.parentElement && el.parentElement.closest('.markmap-node');
              const parentTextEl = parentG && parentG.querySelector('text, .markmap-foreign');
              if (parentTextEl && parentTextEl.textContent.trim() === pathParts[pathParts.length - 2]) {
                match = el;
              }
            }
          }
        });
        return match;
      }

      // Navigate to a node: unfold, zoom, highlight
      function navigateToNode(entry) {
        // Close search panel
        searchPanel.classList.remove('open');

        // Unfold ancestors
        unfoldToNode(entry.node, root);
        mm.setData(root);

        setTimeout(() => {
          attachNodeClickHandlers();

          const targetEl = findSvgNodeElement(entry.text, entry.pathParts);
          if (targetEl) {
            // Parse transform to get node position
            const transform = targetEl.getAttribute('transform');
            const m = transform && transform.match(/translate\(([-\d.e]+)[,\s]+([-\d.e]+)\)/);
            if (m) {
              const tx = parseFloat(m[1]);
              const ty = parseFloat(m[2]);
              const svgRect = svg.getBoundingClientRect();
              const scale = 1.5;
              const x = svgRect.width / 2 - tx * scale;
              const y = svgRect.height / 2 - ty * scale;
              const t = d3.zoomIdentity.translate(x, y).scale(scale);
              // Use Markmap's internal zoom behavior
              try {
                mm.svg.transition().duration(500).call(mm.zoom.transform, t);
              } catch(err) {
                // Fallback: reset to fit all nodes
                mm.fit();
              }
            }

            // Highlight animation (1.8s = 0.6s × 3 iterations)
            targetEl.classList.add('search-highlight');
            setTimeout(() => targetEl.classList.remove('search-highlight'), 1800);
          }

          // Open sidebar for depth >= 2
          if (entry.depth >= 2) {
            openSidebar(entry);
          }
        }, 500);
      }

      // Keyboard shortcuts
      document.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
          e.preventDefault();
          toggleSearch();
        }
        if (e.key === 'Escape' && searchPanel.classList.contains('open')) {
          searchPanel.classList.remove('open');
          searchInput.blur();
        }
      });

    })();
  </script>
</body>
</html>

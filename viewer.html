<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; font-src https://cdn.jsdelivr.net; img-src 'self' data:; connect-src 'self';">
  <title>心智圖檢視器</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ===== Viewer-specific CSS variables ===== */
    :root {
      --clickable-node: #a5b4fc;
      --clickable-node-hover: #c7d2fe;
    }

    /* ===== Markmap core layout ===== */
    #markmap-wrap { width: 100%; height: calc(100vh - 56px); margin-top: 56px; position: relative; }
    #markmap-wrap svg { width: 100%; height: 100%; display: block; }

    /* ===== Markmap dark theme ===== */
    .markmap-node text { font-weight: 500 !important; }
    .markmap-node circle { fill: var(--bg, #0f172a) !important; stroke-width: 2px !important; }
    .markmap-foreign { font-weight: 500 !important; }

    /* ===== Detail Sidebar ===== */
    #detail-sidebar {
      position: fixed; top: 56px; right: 0; bottom: 0;
      width: var(--sidebar-width, 380px);
      max-width: 60vw;
      background: var(--bg-card, #1e293b);
      border-left: 1px solid rgba(255,255,255,0.1);
      z-index: 200;
      display: flex;
      transform: translateX(100%);
      transition: transform 0.3s ease;
      overflow: hidden;
    }
    #detail-sidebar.open { transform: translateX(0); }

    /* Resize handle */
    .sidebar-resize-handle {
      width: 5px; cursor: col-resize;
      background: transparent;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .sidebar-resize-handle:hover,
    .sidebar-resize-handle.dragging { background: var(--accent, #6366f1); }

    .sidebar-inner {
      flex: 1; display: flex; flex-direction: column;
      overflow: hidden; min-width: 0;
    }

    /* Sidebar header */
    .sidebar-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem; border-bottom: 1px solid rgba(255,255,255,0.1);
      flex-shrink: 0;
    }
    .sidebar-header h3 { font-size: 1.15rem; font-weight: 600; margin: 0; }
    .sidebar-header-text { flex: 1; min-width: 0; }
    .sidebar-path {
      font-size: 0.7rem; color: var(--text-muted); opacity: 0.7;
      margin-bottom: 0.15rem; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }
    .sidebar-close {
      background: none; border: none; color: var(--text-muted);
      font-size: 1.5rem; cursor: pointer; padding: 0 0.25rem;
      line-height: 1;
    }
    .sidebar-close:hover { color: var(--text); }

    /* Sidebar tabs */
    .sidebar-tabs {
      display: flex; border-top: 1px solid rgba(255,255,255,0.1);
      flex-shrink: 0; overflow-x: auto;
    }
    .sidebar-tab {
      flex: 1; padding: 0.6rem 0.5rem; text-align: center;
      font-size: 0.8rem; cursor: pointer; white-space: nowrap;
      background: none; border: none; border-bottom: 2px solid transparent;
      color: var(--text-muted); transition: color 0.2s, border-color 0.2s;
    }
    .sidebar-tab:hover { color: var(--text); }
    .sidebar-tab.active {
      color: var(--accent, #6366f1);
      border-bottom-color: transparent;
      box-shadow: inset 0 2px 0 0 var(--accent, #6366f1);
    }

    /* Sidebar body */
    .sidebar-body {
      flex: 1; overflow-y: auto; padding: 1.25rem 1.5rem;
    }
    .sidebar-body .tab-pane { display: none; }
    .sidebar-body .tab-pane.active { display: block; }
    .sidebar-body::-webkit-scrollbar { width: 4px; }
    .sidebar-body::-webkit-scrollbar-track { background: transparent; }
    .sidebar-body::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.15); border-radius: 2px;
    }
    .sidebar-body::-webkit-scrollbar-thumb:hover {
      background: rgba(255,255,255,0.25);
    }

    /* Node checkbox in sidebar */
    .sidebar-check-row {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.5rem 1rem;
      border-top: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    .sidebar-check-row input[type="checkbox"] {
      width: 18px; height: 18px; accent-color: var(--success, #10b981);
      cursor: pointer;
    }
    .sidebar-check-row label {
      font-size: 0.85rem; cursor: pointer; color: var(--text-muted);
    }
    .sidebar-check-time {
      margin-left: auto; font-size: 0.75rem; color: var(--text-muted);
      opacity: 0.7;
    }

    /* Sidebar content items */
    .detail-item {
      margin-bottom: 0.5rem; line-height: 1.75; font-size: 0.92rem;
      padding: 0.55rem 0.75rem;
      background: rgba(255,255,255,0.03);
      border-radius: 6px;
      border-left: 2px solid rgba(99,102,241,0.3);
    }
    .detail-item strong { color: var(--accent); }
    .detail-item .search-link {
      display: inline-block; margin-left: 0.35rem;
      font-size: 0.75rem; color: var(--text-muted); opacity: 0.5;
      text-decoration: none; vertical-align: middle;
      transition: opacity 0.2s, color 0.2s;
    }
    .detail-item .search-link:hover { opacity: 1; color: var(--accent); }
    /* Example sentence: italic, softer color, quote feel */
    .detail-item--example {
      font-style: italic;
      font-size: 0.88rem;
      color: var(--text-muted);
      background: rgba(16,185,129,0.06);
      border-left-color: rgba(16,185,129,0.45);
    }
    .detail-item--example::before {
      content: '“'; margin-right: 0.25rem;
      color: rgba(16,185,129,0.7); font-size: 1.1rem; font-style: normal;
    }
    /* Formula / structural pattern: monospace, subtle purple */
    .detail-item--formula {
      font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
      font-size: 0.86rem;
      letter-spacing: 0.01em;
      background: rgba(139,92,246,0.07);
      border-left-color: rgba(139,92,246,0.5);
      color: var(--text);
    }
    /* Meta tags (搭配, 常見於, 作主詞): smaller muted text */
    .detail-item--meta {
      font-size: 0.82rem;
      color: var(--text-muted);
      background: transparent;
      border-left-color: transparent;
      padding: 0.25rem 0.75rem;
      margin-bottom: 0.2rem;
    }
    .sidebar-card--concept .detail-item--example,
    .sidebar-card--concept .detail-item--formula {
      background: rgba(255,255,255,0.03);
      border-left: 2px solid;
      padding: 0.45rem 0.7rem;
      margin-bottom: 0.35rem;
    }
    .sidebar-card--concept .detail-item--example { border-left-color: rgba(16,185,129,0.45); }
    .sidebar-card--concept .detail-item--formula { border-left-color: rgba(139,92,246,0.5); }
    .detail-section-title {
      font-size: 0.85rem; color: var(--text-muted);
      letter-spacing: 0.03em; font-weight: 600;
      margin: 1.5rem 0 0.6rem; padding-bottom: 0.3rem;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    /* Depth 1: sub-section headers (出處, 作者, etc.) */
    .detail-bullet {
      padding-left: 0.85rem; margin-top: 1rem; margin-bottom: 0.35rem;
      position: relative; font-weight: 600; font-size: 0.9rem;
      line-height: 1.65;
    }
    .detail-bullet::before {
      content: ''; position: absolute; left: 0; top: 0.5em;
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent, #6366f1); opacity: 0.8;
    }
    /* Depth 2: content bullets */
    .detail-bullet-l2 {
      padding-left: 1.85rem; margin-bottom: 0.35rem;
      position: relative; font-size: 0.87rem;
      line-height: 1.7; color: var(--text);
    }
    .detail-bullet-l2::before {
      content: '–'; position: absolute; left: 0.85rem;
      color: var(--text-muted); opacity: 0.65;
    }
    /* Depth 3: nested detail bullets */
    .detail-bullet-l3 {
      padding-left: 2.85rem; margin-bottom: 0.3rem;
      position: relative; font-size: 0.82rem;
      line-height: 1.65; color: var(--text-muted);
    }
    .detail-bullet-l3::before {
      content: '·'; position: absolute; left: 1.85rem;
      color: var(--text-muted); opacity: 0.6;
    }
    /* Example sentences inside bullets: italic, emerald-tinted card */
    .detail-bullet--example,
    .detail-bullet-l2--example,
    .detail-bullet-l3--example {
      font-style: italic;
      font-weight: 400;
      color: var(--text);
      background: rgba(16,185,129,0.07);
      border-left: 2px solid rgba(16,185,129,0.5);
      border-radius: 4px;
      padding: 0.4rem 0.7rem 0.4rem 1.6rem;
      margin-top: 0.3rem;
      margin-bottom: 0.35rem;
    }
    .detail-bullet--example::before,
    .detail-bullet-l2--example::before,
    .detail-bullet-l3--example::before {
      content: '“'; left: 0.55rem; top: 0.25rem;
      color: rgba(16,185,129,0.75); font-size: 1.1rem;
      font-style: normal; background: none; width: auto; height: auto;
      border-radius: 0; opacity: 1;
    }
    /* Structural patterns / formulas inside bullets: monospace */
    .detail-bullet--formula,
    .detail-bullet-l2--formula,
    .detail-bullet-l3--formula {
      font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
      font-size: 0.83rem;
      font-weight: 500;
      letter-spacing: 0.01em;
      color: var(--text);
      background: rgba(139,92,246,0.07);
      border-left: 2px solid rgba(139,92,246,0.5);
      border-radius: 4px;
      padding: 0.35rem 0.7rem 0.35rem 1.6rem;
      margin-bottom: 0.3rem;
    }
    .detail-bullet--formula::before,
    .detail-bullet-l2--formula::before,
    .detail-bullet-l3--formula::before {
      content: ''; background: none;
      width: auto; height: auto;
    }

    /* ===== Card Containers ===== */
    .sidebar-card {
      background: rgba(255,255,255,0.03);
      border-radius: 8px;
      padding: 0.85rem 1rem;
      margin-bottom: 1rem;
      border-left: 3px solid var(--accent, #6366f1);
    }
    .sidebar-card--association {
      border-left-color: var(--warning, #f59e0b);
      background: rgba(245,158,11,0.04);
    }
    .sidebar-card--concept {
      border-left-color: rgba(99,102,241,0.4);
    }
    .sidebar-card--concept .detail-item {
      background: none; border-left: none;
      padding: 0; margin-bottom: 0.35rem;
    }
    .sidebar-card--tips {
      border-left-color: var(--accent, #6366f1);
      background: rgba(99,102,241,0.04);
    }
    .sidebar-card .detail-section-title {
      margin-top: 0; border-bottom: none; padding-bottom: 0;
      margin-bottom: 0.5rem;
    }
    .association-item {
      font-size: 0.87rem; line-height: 1.75;
      color: var(--text); margin-bottom: 0.4rem;
      padding-left: 1.5rem; position: relative;
    }
    .association-item::before {
      content: '💡'; position: absolute; left: 0; top: 0;
      font-size: 0.8rem;
    }
    .exam-tip-item {
      font-size: 0.87rem; line-height: 1.75;
      color: var(--text); margin-bottom: 0.4rem;
      padding-left: 1.5rem; position: relative;
    }
    .exam-tip-item::before {
      content: '✦'; position: absolute; left: 0.2rem; top: 0;
      color: var(--accent, #6366f1); font-size: 0.7rem;
    }

    /* Quiz inside sidebar */
    .sidebar-question {
      margin-bottom: 1.25rem;
      background: rgba(255,255,255,0.03);
      padding: 1rem;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .sidebar-question .q-text { font-size: 0.88rem; margin-bottom: 0.5rem; line-height: 1.7; }
    .sidebar-question .q-year {
      font-size: 0.75rem; color: var(--accent); margin-bottom: 0.35rem;
      font-weight: 500;
    }
    .sidebar-question .sq-options { list-style: none; padding: 0; }
    .sidebar-question .sq-opt-btn {
      display: block; width: 100%; text-align: left;
      padding: 0.6rem 0.85rem; margin-bottom: 0.35rem;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px; color: var(--text); font-size: 0.85rem;
      cursor: pointer; transition: border-color 0.2s, background 0.2s;
    }
    .sq-opt-btn:hover:not(.sq-disabled) { border-color: var(--accent); background: rgba(99,102,241,0.1); }
    .sq-opt-btn.sq-correct { border-color: var(--success); background: rgba(16,185,129,0.15); }
    .sq-opt-btn.sq-wrong { border-color: var(--error, #ef4444); background: rgba(239,68,68,0.15); }
    .sq-opt-btn.sq-disabled { cursor: default; }
    .sidebar-question .sq-explanation {
      margin-top: 0.6rem; padding: 0.75rem 0.85rem;
      background: rgba(255,255,255,0.04); border-left: 3px solid var(--accent);
      border-radius: 4px; font-size: 0.85rem; line-height: 1.65;
      display: none;
    }
    .sidebar-question .sq-explanation.show { display: block; }

    /* ===== Formula Card Styles ===== */
    .formula-card {
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .formula-card:last-of-type { border-bottom: none; }
    .formula-title {
      font-size: 0.9rem; font-weight: 600;
      color: var(--accent); margin-bottom: 0.5rem;
    }
    .formula-katex {
      text-align: center; padding: 1rem;
      background: rgba(255,255,255,0.04);
      border-radius: 8px; margin-bottom: 0.75rem;
      overflow-x: auto;
    }
    .formula-table {
      width: 100%; border-collapse: collapse;
      font-size: 0.8rem; margin-bottom: 0.75rem;
    }
    .formula-table th {
      text-align: left; padding: 0.4rem 0.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.15);
      color: var(--text-muted); font-weight: 500;
    }
    .formula-table td {
      padding: 0.4rem 0.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .formula-table td .katex { font-size: 0.95em; }

    /* KaTeX in markmap nodes: inherit node text color so formulas are visible on dark bg */
    .markmap-foreign .katex,
    .markmap-foreign .katex .katex-html { color: inherit !important; }
    /* KaTeX in sidebar */
    .formula-katex .katex,
    .formula-table .katex,
    .detail-item .katex,
    .detail-bullet .katex,
    .detail-bullet-l2 .katex,
    .detail-bullet-l3 .katex,
    #sidebar-title .katex { color: var(--text) !important; }
    .formula-section-title {
      font-size: 0.85rem; font-weight: 600;
      margin: 0.75rem 0 0.4rem;
    }
    .formula-geo {
      font-size: 0.8rem; line-height: 1.6;
      padding-left: 0.5rem; color: var(--text-muted);
    }
    .formula-tip {
      font-size: 0.8rem; padding-left: 1rem;
      margin-bottom: 0.25rem; position: relative;
    }
    .formula-tip::before {
      content: '•'; position: absolute; left: 0; color: var(--accent);
    }

    /* Clickable node indicator */
    .markmap-node.clickable-node { cursor: pointer; }
    .markmap-node.clickable-node .markmap-foreign {
      color: var(--clickable-node) !important;
    }
    .markmap-node.clickable-node text {
      fill: var(--clickable-node) !important;
    }
    .markmap-node.clickable-node:hover .markmap-foreign {
      color: var(--clickable-node-hover) !important;
      text-decoration: underline;
    }
    .markmap-node.clickable-node:hover text {
      fill: var(--clickable-node-hover) !important;
      text-decoration: underline;
      text-decoration-color: var(--clickable-node-hover);
    }
    /* Non-clickable nodes (root & category) dimmer */
    .markmap-node:not(.clickable-node) .markmap-foreign {
      color: rgba(255,255,255,0.6) !important;
    }
    .markmap-node:not(.clickable-node) text {
      fill: rgba(255,255,255,0.6) !important;
    }

    /* Node completion status on mindmap */
    .markmap-node.node-checked circle {
      fill: var(--success, #10b981) !important;
      stroke: var(--success, #10b981) !important;
    }
    .markmap-node.node-checked > text,
    .markmap-node.node-checked foreignObject {
      opacity: 0.6 !important;
    }
    .markmap-node .node-time-label {
      font-size: 10px; fill: var(--success, #10b981);
      opacity: 0.85; pointer-events: none;
      text-decoration: none !important;
    }
    .markmap-node.node-unchecked circle {
      fill: var(--bg, #0f172a) !important;
      stroke-width: 2px !important;
    }

    /* Progress bar in nav */
    .nav-progress {
      display: flex; align-items: center; gap: 0.5rem;
      font-size: 0.8rem; color: var(--text-muted);
    }
    .nav-progress-bar {
      width: 80px; height: 6px; background: rgba(255,255,255,0.1);
      border-radius: 3px; overflow: hidden;
    }
    .nav-progress-fill {
      height: 100%; background: var(--success);
      border-radius: 3px; transition: width 0.3s;
    }

    /* ===== Search Panel (inline expand) ===== */
    .search-container {
      position: relative;
      display: flex;
      align-items: center;
    }
    /* Hide button when search is open */
    .search-container.open #btn-search { display: none; }
    .search-panel {
      position: relative;
      width: 0;
      overflow: hidden;
      transition: width 0.25s ease;
    }
    .search-container.open .search-panel {
      width: 220px;
    }
    .search-input-wrap {
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      min-width: 220px;
    }
    #search-input {
      flex: 1;
      padding: 8px 12px;
      border: none;
      background: transparent;
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
      box-sizing: border-box;
      min-width: 0;
    }
    #search-input::placeholder { color: rgba(255,255,255,0.35); }
    .search-close-btn {
      background: none; border: none; color: rgba(255,255,255,0.5);
      font-size: 1.1rem; cursor: pointer; padding: 6px 10px;
      line-height: 1; transition: color 0.15s;
    }
    .search-close-btn:hover { color: #fff; }
    /* Results dropdown from input */
    .search-results-wrap {
      position: fixed;
      top: 56px;
      right: 1rem;
      width: min(340px, calc(100vw - 2rem));
      background: var(--bg-card);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      z-index: 1000;
      overflow: hidden;
      display: none;
    }
    .search-results-wrap.has-results { display: block; }
    .search-results {
      list-style: none;
      margin: 0; padding: 0;
      max-height: 360px;
      overflow-y: auto;
    }
    .search-results li {
      padding: 10px 14px;
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      transition: background 0.15s;
    }
    .search-results li:hover,
    .search-results li.active { background: rgba(99,102,241,0.15); }
    .search-results li:last-child { border-bottom: none; }
    .search-result-text {
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--text);
    }
    .search-result-text mark {
      background: rgba(99,102,241,0.4);
      color: #fff;
      border-radius: 2px;
      padding: 0 1px;
    }
    .search-result-path {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.4);
      margin-top: 2px;
    }
    .search-no-result {
      padding: 16px 14px;
      color: rgba(255,255,255,0.35);
      font-size: 0.85rem;
      text-align: center;
    }
    /* Search highlight on mind map node */
    @keyframes search-pulse {
      0%, 100% { filter: drop-shadow(0 0 6px rgba(99,102,241,0.6)); }
      50% { filter: drop-shadow(0 0 18px rgba(99,102,241,1)); }
    }
    .search-highlight {
      animation: search-pulse 0.6s ease-in-out 3;
    }

    /* ===== Mobile sidebar ===== */
    @media (max-width: 768px) {
      #detail-sidebar { width: 100% !important; max-width: 100vw; }
      .sidebar-resize-handle { display: none; }
      .viewer-nav .topic-title { font-size: 0.85rem; }
      .nav-progress { display: none; }
      .search-container.open .search-panel { width: 180px; }
      .search-input-wrap { min-width: 180px; }
      .search-results-wrap { width: calc(100vw - 2rem); right: -0.5rem; }
    }
  </style>
</head>
<body>
  <nav class="viewer-nav">
    <a id="back-btn" href="index.html" class="back-btn">← 返回</a>
    <span class="topic-title" id="viewer-title">載入中...</span>
    <div class="nav-progress" id="nav-progress">
      <div class="nav-progress-bar"><div class="nav-progress-fill" id="nav-progress-fill"></div></div>
      <span id="nav-progress-text">0/0</span>
    </div>
    <div class="nav-actions">
      <div class="search-container" id="search-container">
        <button class="btn btn-secondary" id="btn-search">🔍 搜尋</button>
        <div class="search-panel" id="search-panel">
          <div class="search-input-wrap">
            <input type="text" id="search-input" placeholder="搜尋心智圖節點..." autocomplete="off" aria-label="搜尋心智圖節點">
            <button class="search-close-btn" id="search-close-btn" aria-label="關閉搜尋">&times;</button>
          </div>
        </div>
        <div class="search-results-wrap" id="search-results-wrap">
          <ul class="search-results" id="search-results"></ul>
        </div>
      </div>
      <button class="btn btn-secondary" id="btn-quiz">📝 練習題</button>
    </div>
  </nav>

  <div id="markmap-wrap"></div>

  <!-- Detail Sidebar -->
  <aside id="detail-sidebar">
    <div class="sidebar-resize-handle" id="sidebar-resize-handle"></div>
    <div class="sidebar-inner">
      <div class="sidebar-header">
        <div class="sidebar-header-text">
          <div class="sidebar-path" id="sidebar-path"></div>
          <h3 id="sidebar-title">節點詳情</h3>
        </div>
        <button class="sidebar-close" id="sidebar-close" aria-label="關閉側欄">&times;</button>
      </div>
      <div class="sidebar-body">
        <div class="tab-pane active" id="tab-concepts"></div>
        <div class="tab-pane" id="tab-exam"></div>
      </div>
      <div class="sidebar-check-row" id="sidebar-check-row">
        <input type="checkbox" id="sidebar-cb">
        <label for="sidebar-cb">已完成複習</label>
        <span class="sidebar-check-time" id="sidebar-check-time"></span>
      </div>
      <nav class="sidebar-tabs">
        <button class="sidebar-tab active" data-tab="concepts">📘 概念與應用</button>
        <button class="sidebar-tab" data-tab="exam">🎯 考試準備</button>
      </nav>
    </div>
  </aside>

  <!-- KaTeX (must load BEFORE markmap-lib so its katex plugin can detect it) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" integrity="sha384-nB0miv6/jRmo5UMMR1wu3Gz6NLsoTkbqJghGIsx//Rlm+ZU03BU6SQNC66uf4l5+" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" integrity="sha384-7zkQWkzuo3B5mTepMUcHkMB5jZaolc2xDwL6VFqjFALcbeS9Ggm/Yr2r3Dy4lfFg" crossorigin="anonymous"></script>

  <!-- Programmatic Markmap CDN -->
  <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0" integrity="sha384-CjloA8y00+1SDAUkjs099PVfnY2KmDC2BZnws9kh8D/lX1s46w6EPhpXdqMfjK6i" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/markmap-lib@0.15.5/dist/browser/index.js" integrity="sha384-AVDQOckjK6RwSlhHhFnApwq9ETT8HOlp5L6hVKuNWeozZo2aJGgJTJ719XKUS/4W" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/markmap-view@0.15.8/dist/browser/index.js" integrity="sha384-cWnlwEdzWoXF/uaO1O5rDdlXPSrDtkx2Yk6FZWyOa1UUjSydXMBVgZVt5GELc5pk" crossorigin="anonymous"></script>
  <script src="js/app.js?v=2"></script>
  <script>
    (async function() {
      /* ===== KaTeX loaded synchronously via <script> tag above ===== */

      const subjectId = getParam('subject');
      const subId = getParam('sub');
      if (!subjectId || !isValidParam(subjectId)) { window.location.href = 'index.html'; return; }
      if (subId && !isValidParam(subId)) { window.location.href = 'index.html'; return; }

      /* ---------- Load subject metadata ---------- */
      const subjectsData = await loadSubjects();
      const subject = subjectsData.subjects.find(s => s.id === subjectId);
      if (!subject) { window.location.href = 'index.html'; return; }

      let displayTitle = subject.icon + ' ' + subject.title;
      if (subId && subject.subSubjects) {
        const sub = subject.subSubjects.find(s => s.id === subId);
        if (sub) displayTitle = sub.icon + ' ' + sub.title;
      }
      document.title = displayTitle + ' - 心智圖';
      document.getElementById('viewer-title').textContent = displayTitle;
      document.getElementById('back-btn').href = subject.hasSubjects
        ? buildSubjectUrl(subjectId)
        : 'index.html';

      /* ---------- Load topics metadata ---------- */
      let topicsData;
      try {
        topicsData = await loadTopicsFor(subjectId, subId);
      } catch {
        document.getElementById('markmap-wrap').innerHTML =
          '<div class="loading" style="height:80vh">無法載入主題資料</div>';
        return;
      }
      const allTopics = getAllTopics(topicsData);
      const topicTitleToId = {};
      allTopics.forEach(t => { topicTitleToId[t.title] = t.id; });

      /* ---------- Quiz button → pick topic ---------- */
      document.getElementById('btn-quiz').addEventListener('click', () => {
        if (allTopics.length > 0) {
          window.location.href = buildQuizUrl(subjectId, subId, allTopics[0].id);
        }
      });

      /* ---------- Fetch individual topic markdowns in parallel & merge ---------- */
      const contentBase = getContentBase(subjectId, subId);
      const topicId = getParam('topic');
      if (topicId && !isValidParam(topicId)) { window.location.href = 'index.html'; return; }
      let mergedMd = '';

      // Single-topic mode: when navigating from topic list with ?topic=X
      if (topicId) {
        const topic = allTopics.find(t => t.id === topicId);
        if (topic) {
          saveSubjectLocation(subjectId, subId, topicId);
          // Update page title and nav title to show the specific topic
          const topicTitle = topic.icon + ' ' + topic.title;
          document.title = topic.title + ' - 心智圖';
          document.getElementById('viewer-title').textContent = topicTitle;
          // Back button → subject listing page
          document.getElementById('back-btn').href = buildSubjectUrl(subjectId, subId);
          try {
            const res = await fetch(contentBase + '/' + topic.file, { cache: 'no-cache' });
            mergedMd = res.ok ? (await res.text()) : '';
          } catch {
            mergedMd = '';
          }
        }
      }

      if (!topicId) {
        saveSubjectLocation(subjectId, subId, null);
        try {
        const rootTitle = displayTitle.replace(/^[^\s]+\s/, ''); // strip emoji
        if (topicsData.groupByCategory) {
          /* Category-aware merge with optional group nesting:
             - Categories with "group" field: root → group → category → topic (bump +3)
             - Categories without "group":    root → category → topic (bump +2) */
          const groupMap = new Map(); // group name → array of category markdown parts
          const ungrouped = [];       // categories without a group
          for (const cat of topicsData.categories) {
            const catName = cat.name.replace(/^[^\s]+\s/, '');
            const fetches = cat.topics.map(topic =>
              fetch(contentBase + '/' + topic.file, { cache: 'no-cache' })
                .then(r => r.ok ? r.text() : null)
                .catch(() => null)
            );
            const results = await Promise.all(fetches);
            if (cat.group) {
              const topicMds = results
                .filter(Boolean)
                .map(md => md.replace(/^(#{1,3})\s/gm, (m, hashes) => '###' + hashes + ' '));
              const catMd = '### ' + catName + '\n\n' + topicMds.join('\n\n');
              if (!groupMap.has(cat.group)) groupMap.set(cat.group, []);
              groupMap.get(cat.group).push(catMd);
            } else {
              const topicMds = results
                .filter(Boolean)
                .map(md => md.replace(/^(#{1,4})\s/gm, (m, hashes) => '##' + hashes + ' '));
              ungrouped.push('## ' + catName + '\n\n' + topicMds.join('\n\n'));
            }
          }
          const allParts = [];
          for (const [groupName, catMds] of groupMap) {
            allParts.push('## ' + groupName + '\n\n' + catMds.join('\n\n'));
          }
          allParts.push(...ungrouped);
          mergedMd = '# ' + rootTitle + '\n\n' + allParts.join('\n\n');
        } else {
          /* Flat merge (no categories): root → topic (bump headings +1) */
          const fetches = allTopics.map(topic =>
            fetch(contentBase + '/' + topic.file)
              .then(r => r.ok ? r.text() : null)
              .catch(() => null)
          );
          const results = await Promise.all(fetches);
          const parts = results
            .filter(Boolean)
            .map(md => md.replace(/^(#{1,5})\s/gm, (m, hashes) => '#' + hashes + ' '));
          mergedMd = '# ' + rootTitle + '\n\n' + parts.join('\n\n');
        }
        } catch {
          document.getElementById('markmap-wrap').innerHTML =
            '<div class="loading" style="height:80vh">無法載入心智圖內容</div>';
          return;
        }
      }

      if (!mergedMd.trim()) {
        document.getElementById('markmap-wrap').innerHTML =
          '<div class="loading" style="height:80vh">尚無心智圖內容</div>';
        return;
      }

      /* ---------- Filter to h1-h4 only for Markmap display (only headings render as nodes) ---------- */
      const filteredMd = mergedMd.split('\n')
        .filter(line => /^#{1,4}\s/.test(line) || line.trim() === '')
        .join('\n');

      /* ---------- Transform markdown → markmap tree ----------
         Dual-tree: `root` (filtered, h1-h4 only) drives the visual mindmap;
         `fullRoot` retains the complete subtree (bullets, h5/h6) for sidebar
         lookup so clicking a node can show its full markdown content. */
      const { Transformer } = window.markmap;
      const { Markmap } = window.markmap;
      const transformer = new Transformer();
      const { root } = transformer.transform(filteredMd);
      const { root: fullRoot } = transformer.transform(mergedMd);

      function findFullNode(pathParts) {
        let node = fullRoot;
        for (const target of (pathParts || [])) {
          if (!node || !node.children) return null;
          const next = node.children.find(c => {
            const t = (c.content || '').replace(/<[^>]+>/g, '').trim();
            return t === target;
          });
          if (!next) return null;
          node = next;
        }
        return node;
      }

      /* ---------- Render markmap ---------- */
      // NOTE: buildNodeMap must run AFTER Markmap.create because initializeData()
      // replaces each node's children array with shallow copies ({ ...child }),
      // invalidating any node references captured before that call.
      const wrap = document.getElementById('markmap-wrap');
      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.setAttribute('id', 'mindmap-svg');
      wrap.appendChild(svg);

      const mm = Markmap.create(svg, {
        initialExpandLevel: 1,
        duration: 300,
        maxWidth: 300,
        paddingX: 16,
      }, root);

      /* ---------- Restore saved fold (expand/collapse) state ---------- */
      function collectFoldState(node, path) {
        const map = {};
        const text = (node.content || '').replace(/<[^>]+>/g, '').trim();
        const currentPath = text ? (path ? path + '/' + text : text) : path;
        if (node.payload && typeof node.payload.fold === 'number' && currentPath) {
          map[currentPath] = node.payload.fold;
        }
        if (node.children) {
          node.children.forEach(c => Object.assign(map, collectFoldState(c, currentPath)));
        }
        return map;
      }

      function applyFoldState(node, foldMap, path) {
        const text = (node.content || '').replace(/<[^>]+>/g, '').trim();
        const currentPath = text ? (path ? path + '/' + text : text) : path;
        if (currentPath && currentPath in foldMap) {
          if (!node.payload) node.payload = {};
          node.payload.fold = foldMap[currentPath];
        }
        if (node.children) {
          node.children.forEach(c => applyFoldState(c, foldMap, currentPath));
        }
      }

      const savedFold = getFoldState(subjectId, subId, topicId);
      let foldRestored = false;
      if (savedFold && Object.keys(savedFold).length > 0) {
        applyFoldState(root, savedFold, '');
        mm.renderData();
        foldRestored = true;
      }

      /* ---------- Restore saved zoom/pan position ---------- */
      const savedTransform = getViewTransform(subjectId, subId, topicId);
      if (savedTransform) {
        // Delay must account for Markmap animation (300ms) + fold renderData
        const delay = foldRestored ? 500 : 400;
        setTimeout(() => {
          const t = d3.zoomIdentity.translate(savedTransform.x, savedTransform.y).scale(savedTransform.k);
          mm.svg.call(mm.zoom.transform, t);
        }, delay);
      }

      /* ---------- Save zoom/pan + fold state on leave ---------- */
      window.addEventListener('beforeunload', () => {
        const t = d3.zoomTransform(svg);
        saveViewTransform(subjectId, subId, topicId, t);
        saveFoldState(subjectId, subId, topicId, collectFoldState(root, ''));
      });

      /* ---------- Build node ID map for checkboxes & sidebar ---------- */
      const nodeMap = {}; // nodeId → { node, depth, path }
      function buildNodeMap(node, depth, pathParts) {
        const text = (node.content || '').replace(/<[^>]+>/g, '').trim();
        if (depth >= 1 && text) {
          const nodeId = buildNodeKey(subjectId, subId, pathParts.concat(text));
          const hasChildren = !!(node.children && node.children.length > 0);
          nodeMap[nodeId] = { node, depth, text, pathParts: pathParts.concat(text), hasChildren };
          node._nodeId = nodeId;
          node._depth = depth;
          node._plainText = text;
          node._htmlContent = node.content || '';
        }
        if (node.children) {
          node.children.forEach(c => buildNodeMap(c, depth + 1, depth >= 1 && text ? pathParts.concat(text) : pathParts));
        }
      }
      buildNodeMap(root, 0, []);

      /* ---------- Node checkbox progress ---------- */
      function updateProgress() {
        const checkable = Object.keys(nodeMap).filter(id => nodeMap[id].depth >= 2 && nodeMap[id].hasChildren);
        const checked = checkable.filter(id => isNodeChecked(id));
        const text = document.getElementById('nav-progress-text');
        const fill = document.getElementById('nav-progress-fill');
        if (text) text.textContent = checked.length + '/' + checkable.length;
        if (fill) fill.style.width = checkable.length > 0
          ? (checked.length / checkable.length * 100) + '%' : '0%';
      }
      updateProgress();

      /* ---------- Node click → open sidebar ---------- */
      const sidebar = document.getElementById('detail-sidebar');
      const sidebarTitle = document.getElementById('sidebar-title');

      // Preload detail & question data (single-topic mode: only load relevant topic)
      const detailsCache = {};
      const questionsCache = {};
      const topicsToLoad = topicId ? allTopics.filter(t => t.id === topicId) : allTopics;
      for (const topic of topicsToLoad) {
        // details
        fetch(contentBase + '/details/' + topic.id + '.json')
          .then(r => r.ok ? r.json() : null)
          .then(d => { if (d) detailsCache[topic.id] = d; })
          .catch(() => {});
        // questions
        const qBase = getQuestionBase(subjectId, subId);
        fetch(qBase + '/' + topic.id + '.json')
          .then(r => r.ok ? r.json() : null)
          .then(d => { if (d) questionsCache[topic.id] = d; })
          .catch(() => {});
      }

      // After markmap renders, attach click handlers to nodes
      setTimeout(() => attachNodeClickHandlers(), 500);
      // Re-attach after expand/collapse
      svg.addEventListener('click', () => {
        setTimeout(() => attachNodeClickHandlers(), 350);
      });

      function formatNodeTime(isoStr) {
        if (!isoStr) return '';
        const d = new Date(isoStr);
        return (d.getMonth()+1) + '/' + d.getDate() + ' ' +
          String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
      }

      function applyNodeTimestamp(el, nodeId) {
        // Remove old timestamp label
        el.querySelectorAll('.node-time-label').forEach(t => t.remove());
        const t = getNodeCheckedTime(nodeId);
        if (!t) return;
        const timeStr = '\u2714 ' + formatNodeTime(t);

        // Find the content element to measure its position and size
        const foreign = el.querySelector('foreignObject');
        const nodeText = el.querySelector(':scope > text');
        let xPos = 8, yPos = 20;

        if (foreign) {
          const fx = parseFloat(foreign.getAttribute('x')) || 0;
          const fw = parseFloat(foreign.getAttribute('width')) || 0;
          const fy = parseFloat(foreign.getAttribute('y')) || 0;
          const fh = parseFloat(foreign.getAttribute('height')) || 0;
          xPos = fx + fw + 6;
          yPos = fy + fh / 2 + 4;
        } else if (nodeText) {
          try {
            const bbox = nodeText.getBBox();
            xPos = bbox.x + bbox.width + 6;
            yPos = bbox.y + bbox.height / 2 + 4;
          } catch(e) { /* getBBox can fail if not rendered */ }
        }

        const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        label.classList.add('node-time-label');
        label.setAttribute('x', String(xPos));
        label.setAttribute('y', String(yPos));
        label.textContent = timeStr;
        el.appendChild(label);
      }

      // Click/dblclick disambiguation timer
      let _clickTimer = null;

      function toggleNodeFold(node) {
        if (!node.payload) node.payload = {};
        node.payload.fold = node.payload.fold ? 0 : 1;
        mm.renderData();
        setTimeout(() => attachNodeClickHandlers(), 350);
      }

      function attachNodeClickHandlers() {
        // Build depth-1 (H2 section headers) entry lookup for sidebar
        const depth1Entries = {};
        Object.values(nodeMap).filter(e => e.depth === 1).forEach(e => {
          depth1Entries[e.text] = e;
        });

        // Build text→entries lookup to detect duplicates (depth >= 2)
        const textToEntries = {};
        Object.values(nodeMap).forEach(e => {
          if (e.depth < 2) return;
          if (!textToEntries[e.text]) textToEntries[e.text] = [];
          textToEntries[e.text].push(e);
        });

        svg.querySelectorAll('.markmap-node').forEach(el => {
          const textEl = el.querySelector('text, .markmap-foreign');
          if (!textEl) return;
          const rawText = textEl.textContent.trim();

          // H2 section headers: click → fold, dblclick → sidebar
          if (depth1Entries[rawText] && !textEl.dataset.expand_bound) {
            textEl.dataset.expand_bound = '1';
            textEl.style.cursor = 'pointer';
            const d1entry = depth1Entries[rawText];
            textEl.addEventListener('click', (e) => {
              e.stopPropagation();
              clearTimeout(_clickTimer);
              _clickTimer = setTimeout(() => toggleNodeFold(d1entry.node), 250);
            });
            textEl.addEventListener('dblclick', (e) => {
              e.stopPropagation();
              clearTimeout(_clickTimer);
              openSidebar(d1entry);
            });
          }

          // Resolve matching nodeMap entry, disambiguate duplicates by parent
          let entry;
          const candidates = textToEntries[rawText];
          if (!candidates || candidates.length === 0) return;
          if (candidates.length === 1) {
            entry = candidates[0];
          } else {
            // Disambiguate: check parent SVG group's text
            const parentG = el.parentElement && el.parentElement.closest('.markmap-node');
            const parentTextEl = parentG && parentG.querySelector('text, .markmap-foreign');
            const parentText = parentTextEl ? parentTextEl.textContent.trim() : '';
            entry = candidates.find(e => {
              const pPath = e.pathParts;
              return pPath.length >= 2 && pPath[pPath.length - 2] === parentText;
            }) || candidates[0];
          }

          const isLeaf = !entry.node.children || entry.node.children.length === 0;
          const boundNodeId = entry.node._nodeId;
          el.classList.add('clickable-node');
          el.style.cursor = 'pointer';

          // Apply checked/unchecked visual
          el.dataset.nodeId = boundNodeId;
          if (isNodeChecked(boundNodeId)) {
            el.classList.add('node-checked');
            el.classList.remove('node-unchecked');
          } else {
            el.classList.add('node-unchecked');
            el.classList.remove('node-checked');
          }

          // Bind click handlers — leaves: single click opens sidebar (no fold available);
          // non-leaves: single click folds, dblclick opens sidebar.
          if (!textEl.dataset.bound) {
            textEl.dataset.bound = '1';
            const boundEntry = entry;
            if (isLeaf) {
              textEl.addEventListener('click', (e) => {
                e.stopPropagation();
                openSidebar(boundEntry);
              });
            } else {
              textEl.addEventListener('click', (e) => {
                e.stopPropagation();
                clearTimeout(_clickTimer);
                _clickTimer = setTimeout(() => toggleNodeFold(boundEntry.node), 250);
              });
              textEl.addEventListener('dblclick', (e) => {
                e.stopPropagation();
                clearTimeout(_clickTimer);
                openSidebar(boundEntry);
              });
            }
          }

          // Apply timestamp as separate element (not inside node content)
          applyNodeTimestamp(el, boundNodeId);
        });
      }

      function updateNodeCheckVisuals() {
        svg.querySelectorAll('.markmap-node[data-node-id]').forEach(el => {
          const nodeId = el.dataset.nodeId;
          if (isNodeChecked(nodeId)) {
            el.classList.add('node-checked');
            el.classList.remove('node-unchecked');
          } else {
            el.classList.remove('node-checked');
            el.classList.add('node-unchecked');
          }
          applyNodeTimestamp(el, nodeId);
        });
      }

      function openSidebar(entry) {
        sidebarTitle.innerHTML = sanitizeHtml(entry.node._htmlContent) || escapeHtml(entry.text);
        const pathEl = document.getElementById('sidebar-path');
        const breadcrumb = entry.pathParts.slice(0, -1);
        pathEl.textContent = breadcrumb.length > 0 ? breadcrumb.join(' › ') : '';
        sidebar.classList.add('open');

        // Adjust markmap wrap width
        const sidebarW = sidebar.offsetWidth;
        wrap.style.marginRight = sidebarW + 'px';

        populateSidebar(entry);
      }

      function closeSidebar() {
        sidebar.classList.remove('open');
        wrap.style.marginRight = '0';
      }

      document.getElementById('sidebar-close').addEventListener('click', closeSidebar);

      /* ---------- Sidebar tab switching ---------- */
      document.querySelectorAll('.sidebar-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.remove('active'));
          document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
          tab.classList.add('active');
          document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
        });
      });

      /* ---------- Populate sidebar content ---------- */
      async function populateSidebar(entry) {
        const nodeId = entry.node._nodeId;
        const nodeText = entry.text;
        const detailData = findDetailForNode(nodeText, entry.pathParts);

        // KaTeX is loaded synchronously via <script> tag

        // --- Tab 1: 概念與應用 (concepts + associations inline) ---
        // Use fullRoot lookup so the sidebar shows the entire markdown subtree
        // (bullets, h5/h6) below the clicked node, not just the filtered headings.
        const fullNode = findFullNode(entry.pathParts) || entry.node;
        const conceptsPane = document.getElementById('tab-concepts');
        conceptsPane.innerHTML = '';
        if (fullNode.children && fullNode.children.length > 0) {
          renderNodeChildrenWithAssociations(fullNode, detailData, conceptsPane, entry.pathParts);
        } else if (detailData && detailData.formulaDetails) {
          renderNodeChildrenWithAssociations(fullNode, detailData, conceptsPane, entry.pathParts);
        } else {
          conceptsPane.innerHTML = '<p class="detail-item" style="color:var(--text-muted)">此節點暫無子項目</p>';
        }

        // Header checkbox
        const cb = document.getElementById('sidebar-cb');
        const timeSpan = document.getElementById('sidebar-check-time');
        cb.checked = isNodeChecked(nodeId);
        function updateCheckTime() {
          const t = getNodeCheckedTime(nodeId);
          if (t) {
            const d = new Date(t);
            timeSpan.textContent = d.getFullYear() + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + String(d.getDate()).padStart(2,'0') + ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
          } else {
            timeSpan.textContent = '';
          }
        }
        updateCheckTime();
        // Remove previous handler if any, then attach new one
        if (cb._handler) cb.removeEventListener('change', cb._handler);
        cb._handler = () => {
          toggleNodeCheck(nodeId);
          updateProgress();
          updateNodeCheckVisuals();
          updateCheckTime();
        };
        cb.addEventListener('change', cb._handler);

        // --- Tab 2: 考試準備 (exam tips + questions) ---
        const examPane = document.getElementById('tab-exam');
        examPane.innerHTML = '';
        // Exam tips first
        if (detailData && detailData.examTips && detailData.examTips.length > 0) {
          const card = document.createElement('div');
          card.className = 'sidebar-card sidebar-card--tips';
          const tipsTitle = document.createElement('div');
          tipsTitle.className = 'detail-section-title';
          tipsTitle.textContent = '🎯 考試重點';
          card.appendChild(tipsTitle);
          detailData.examTips.forEach(tip => {
            const div = document.createElement('div');
            div.className = 'exam-tip-item';
            div.textContent = tip;
            card.appendChild(div);
          });
          examPane.appendChild(card);
        }
        // Then questions
        const relatedQs = findQuestionsForNode(nodeText, entry.pathParts);
        if (relatedQs.length > 0) {
          const qTitle = document.createElement('div');
          qTitle.className = 'detail-section-title';
          qTitle.textContent = '📝 歷屆考題';
          qTitle.style.marginTop = '1.25rem';
          examPane.appendChild(qTitle);
          relatedQs.forEach(q => renderSidebarQuestion(q, examPane));
        }
        // Show empty state only when both are empty
        if (!examPane.hasChildNodes()) {
          examPane.innerHTML = '<p class="detail-item" style="color:var(--text-muted)">尚無考試相關資料</p>';
        }

        // Reset to first tab
        document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
        document.querySelector('.sidebar-tab[data-tab="concepts"]').classList.add('active');
        document.getElementById('tab-concepts').classList.add('active');
      }

      /* ===== Formula Card Renderer ===== */
      function renderFormulaCard(fd, container) {
        const card = document.createElement('div');
        card.className = 'formula-card';

        // Title
        if (fd.title) {
          const t = document.createElement('div');
          t.className = 'formula-title';
          t.textContent = fd.title;
          card.appendChild(t);
        }

        // KaTeX rendered formula
        if (fd.latex) {
          const katexDiv = document.createElement('div');
          katexDiv.className = 'formula-katex';
          try {
            katex.render(fd.latex, katexDiv, { displayMode: true, throwOnError: false });
          } catch (e) {
            katexDiv.textContent = fd.latex;
          }
          card.appendChild(katexDiv);
        }

        // Symbol table
        if (fd.symbols && fd.symbols.length > 0) {
          const secTitle = document.createElement('div');
          secTitle.className = 'formula-section-title';
          secTitle.textContent = '📋 符號解析';
          card.appendChild(secTitle);

          const table = document.createElement('table');
          table.className = 'formula-table';
          const thead = document.createElement('thead');
          thead.innerHTML = '<tr><th>符號</th><th>物理量名稱</th><th>純量 / 向量</th></tr>';
          table.appendChild(thead);
          const tbody = document.createElement('tbody');
          fd.symbols.forEach(s => {
            const tr = document.createElement('tr');
            // Render symbol with KaTeX
            const tdSym = document.createElement('td');
            try {
              katex.render(s.symbol, tdSym, { throwOnError: false });
            } catch (e) {
              tdSym.textContent = s.symbol;
            }
            const tdName = document.createElement('td');
            tdName.textContent = s.name;
            const tdType = document.createElement('td');
            tdType.textContent = s.type;
            tr.appendChild(tdSym);
            tr.appendChild(tdName);
            tr.appendChild(tdType);
            tbody.appendChild(tr);
          });
          table.appendChild(tbody);
          card.appendChild(table);
        }

        // Geometric meaning
        if (fd.geometricMeaning) {
          const secTitle = document.createElement('div');
          secTitle.className = 'formula-section-title';
          secTitle.textContent = '📐 圖表與幾何意義';
          card.appendChild(secTitle);
          const geo = document.createElement('div');
          geo.className = 'formula-geo';
          geo.textContent = fd.geometricMeaning;
          card.appendChild(geo);
        }

        // Exam tips
        if (fd.examTips && fd.examTips.length > 0) {
          const secTitle = document.createElement('div');
          secTitle.className = 'formula-section-title';
          secTitle.textContent = '🎯 考試常考重點';
          card.appendChild(secTitle);
          fd.examTips.forEach(tip => {
            const div = document.createElement('div');
            div.className = 'formula-tip';
            div.textContent = tip;
            card.appendChild(div);
          });
        }

        container.appendChild(card);
      }

      /* ===== Sidebar Content Renderer ===== */
      function renderNodeChildrenWithAssociations(parentNode, detailData, container, pathParts) {
        const associations = extractAssociations(parentNode);
        if (detailData && detailData.associations) {
          detailData.associations.forEach(a => {
            if (!associations.includes(a)) associations.push(a);
          });
        }
        const pathQuery = (pathParts || []).join(' ');

        // If formulaDetails exist, render formula cards first
        const hasFormulas = detailData && detailData.formulaDetails && detailData.formulaDetails.length > 0;
        if (hasFormulas) {
          detailData.formulaDetails.forEach(fd => renderFormulaCard(fd, container));
        }

        // Classify a bullet's content so we can style examples / formulas / meta tags differently
        function classifyDetailItem(raw) {
          const s = (raw || '').trim();
          if (!s) return '';
          // Meta tag: starts with 搭配 / 常見於, or 作X詞／作X語 + colon (X as subject/object/complement)
          if (/^(搭配|常見於)\s/.test(s)) return 'meta';
          if (/^作(主詞|受詞|補語|目的副詞|目的|表語)[：:]/.test(s)) return 'meta';
          // Formula / structural pattern: contains S+/V+/p.p./V-ing/Be +/原形
          if (/(^|\s)(S|V|O|N|Be|be)\s*[＋+]/.test(s) || /\bp\.p\.|V-ing|V-ed|V\(s\/es\)|原形/.test(s)) return 'formula';
          // English example sentence: starts with capital Latin letter, ends with sentence punctuation (optional Chinese parenthetical)
          if (/^[A-Z]/.test(s) && /[.!?][”"'’]?(（[^）]*）)?$/.test(s)) return 'example';
          return '';
        }

        // Recursive child renderer (supports arbitrary depth)
        function renderChildren(node, target, depth, maxDepth) {
          (node.children || []).forEach(child => {
            const text = (child.content || '').replace(/<[^>]+>/g, '').trim();
            if (!text) return;
            if (depth === 0) {
              const hasChildren = child.children && child.children.length > 0;
              // Wrap in card if this top-level item has sub-items
              const wrapper = hasChildren ? document.createElement('div') : null;
              if (wrapper) wrapper.className = 'sidebar-card sidebar-card--concept';
              const appendTo = wrapper || target;
              // Top-level children: bold header with search link
              const div = document.createElement('div');
              const itemKind = classifyDetailItem(text);
              div.className = 'detail-item' + (itemKind ? ' detail-item--' + itemKind : '');
              const span = document.createElement('span');
              span.innerHTML = sanitizeHtml(child.content) || escapeHtml(text);
              if (!hasFormulas && !itemKind) span.style.fontWeight = '600';
              div.appendChild(span);
              const searchQuery = (pathQuery + ' ' + text).trim();
              const searchLink = document.createElement('a');
              searchLink.className = 'search-link';
              searchLink.href = 'https://www.google.com/search?udm=50&q=' + encodeURIComponent(searchQuery);
              searchLink.target = '_blank';
              searchLink.rel = 'noopener noreferrer';
              searchLink.title = 'Google AI 搜尋 ' + searchQuery;
              searchLink.textContent = '🔍';
              div.appendChild(searchLink);
              appendTo.appendChild(div);
              // Recurse children into the card
              if (hasChildren && depth < maxDepth) {
                renderChildren(child, appendTo, depth + 1, maxDepth);
              }
              if (wrapper) target.appendChild(wrapper);
            } else {
              // Deeper children: bullets with increasing indent
              const cls = depth === 1 ? 'detail-bullet' : depth === 2 ? 'detail-bullet-l2' : 'detail-bullet-l3';
              const p = document.createElement('div');
              const itemKind = classifyDetailItem(text);
              p.className = cls + (itemKind ? ' ' + cls + '--' + itemKind : '');
              p.innerHTML = sanitizeHtml(child.content) || escapeHtml(text);
              target.appendChild(p);
              // Recurse if there are deeper children
              if (child.children && child.children.length > 0 && depth < maxDepth) {
                renderChildren(child, target, depth + 1, maxDepth);
              }
            }
          });
        }
        if (!hasFormulas) renderChildren(parentNode, container, 0, 4);

        // Append associations at the end of concepts
        if (associations.length > 0) {
          const card = document.createElement('div');
          card.className = 'sidebar-card sidebar-card--association';
          const title = document.createElement('div');
          title.className = 'detail-section-title';
          title.textContent = '💡 生活聯想與應用';
          card.appendChild(title);
          associations.forEach(a => {
            const div = document.createElement('div');
            div.className = 'association-item';
            div.textContent = a;
            card.appendChild(div);
          });
          container.appendChild(card);
        }
      }

      function extractAssociations(node) {
        const results = [];
        function walk(n) {
          const text = (n.content || '').replace(/<[^>]+>/g, '').trim();
          if (text.includes('💡')) {
            results.push(text.replace(/^💡\s*聯想[：:]\s*/, '').replace(/^💡\s*類比[：:]\s*/, '').replace(/^💡\s*/, ''));
          }
          if (n.children) n.children.forEach(walk);
        }
        walk(node);
        return results;
      }

      function resolveTopicIdFromPath(pathParts) {
        if (!pathParts) return null;
        // Walk pathParts to find the first part that matches a known topic title
        for (const part of pathParts) {
          if (topicTitleToId[part]) return topicTitleToId[part];
        }
        return null;
      }

      function findDetailForNode(nodeText, pathParts) {
        // Scoped lookup (all-topics mode: pathParts includes H1 topic title)
        const scopedId = resolveTopicIdFromPath(pathParts);
        if (scopedId && detailsCache[scopedId]) {
          const d = detailsCache[scopedId];
          if (d.nodes && d.nodes[nodeText]) return d.nodes[nodeText];
        }
        // Single-topic mode fallback: only one file loaded, use it directly
        if (topicId && detailsCache[topicId]) {
          const d = detailsCache[topicId];
          if (d.nodes && d.nodes[nodeText]) return d.nodes[nodeText];
        }
        return null;
      }

      function findQuestionsForNode(nodeText, pathParts) {
        const results = [];
        // Scoped lookup only (avoid cross-topic collision)
        const scopedId = resolveTopicIdFromPath(pathParts);
        if (scopedId && questionsCache[scopedId]) {
          const qd = questionsCache[scopedId];
          if (qd.questions) {
            qd.questions.forEach(q => {
              if (q.tags && q.tags.includes(nodeText)) results.push(q);
            });
          }
        }
        return results;
      }

      function renderSidebarQuestion(q, container) {
        const div = document.createElement('div');
        div.className = 'sidebar-question';
        div.innerHTML = `
          ${q.year ? '<div class="q-year">' + escapeHtml(String(q.year)) + ' 年學測</div>' : ''}
          <div class="q-text">${escapeHtml(q.text)}</div>
          <ul class="sq-options">
            ${q.options.map((opt, i) => {
              const letter = String.fromCharCode(65 + i);
              return '<li><button class="sq-opt-btn" data-letter="' + letter + '">' + escapeHtml(opt) + '</button></li>';
            }).join('')}
          </ul>
          <div class="sq-explanation">${escapeHtml(q.explanation || '')}</div>
        `;
        const buttons = div.querySelectorAll('.sq-opt-btn');
        const explanation = div.querySelector('.sq-explanation');
        buttons.forEach(btn => {
          btn.addEventListener('click', () => {
            if (btn.classList.contains('sq-disabled')) return;
            buttons.forEach(b => {
              b.classList.add('sq-disabled');
              if (b.dataset.letter === q.answer) b.classList.add('sq-correct');
            });
            if (btn.dataset.letter !== q.answer) btn.classList.add('sq-wrong');
            if (explanation) explanation.classList.add('show');
          });
        });
        container.appendChild(div);
      }

      /* ---------- Sidebar resize drag ---------- */
      const resizeHandle = document.getElementById('sidebar-resize-handle');
      let isResizing = false;
      let startX = 0;
      let startWidth = 0;

      function onResizeStart(e) {
        isResizing = true;
        startX = e.clientX || (e.touches && e.touches[0].clientX) || 0;
        startWidth = sidebar.offsetWidth;
        resizeHandle.classList.add('dragging');
        document.body.style.userSelect = 'none';
        document.body.style.cursor = 'col-resize';
      }

      function onResizeMove(e) {
        if (!isResizing) return;
        const clientX = e.clientX || (e.touches && e.touches[0].clientX) || 0;
        const diff = startX - clientX; // dragging left = wider
        let newWidth = Math.max(280, Math.min(window.innerWidth * 0.6, startWidth + diff));
        sidebar.style.setProperty('--sidebar-width', newWidth + 'px');
        sidebar.style.width = newWidth + 'px';
        wrap.style.marginRight = newWidth + 'px';
      }

      function onResizeEnd() {
        if (!isResizing) return;
        isResizing = false;
        resizeHandle.classList.remove('dragging');
        document.body.style.userSelect = '';
        document.body.style.cursor = '';
        // Persist width preference
        localStorage.setItem(STORAGE_PREFIX + 'sidebar-width', sidebar.offsetWidth);
        // Do not auto-center: let user keep their current pan/zoom position
      }

      resizeHandle.addEventListener('mousedown', onResizeStart);
      document.addEventListener('mousemove', onResizeMove);
      document.addEventListener('mouseup', onResizeEnd);
      resizeHandle.addEventListener('touchstart', onResizeStart, { passive: true });
      document.addEventListener('touchmove', onResizeMove, { passive: true });
      document.addEventListener('touchend', onResizeEnd);

      // Restore saved sidebar width
      const savedWidth = localStorage.getItem(STORAGE_PREFIX + 'sidebar-width');
      if (savedWidth) {
        const w = parseInt(savedWidth, 10);
        if (w >= 280 && w <= window.innerWidth * 0.6) {
          sidebar.style.setProperty('--sidebar-width', w + 'px');
          sidebar.style.width = w + 'px';
        }
      }

      /* ===== Search functionality ===== */
      const searchContainer = document.getElementById('search-container');
      const searchInput = document.getElementById('search-input');
      const searchResults = document.getElementById('search-results');
      const searchResultsWrap = document.getElementById('search-results-wrap');
      const btnSearch = document.getElementById('btn-search');

      function openSearch() {
        searchContainer.classList.add('open');
        searchInput.value = '';
        searchResults.innerHTML = '';
        searchResultsWrap.classList.remove('has-results');
        setTimeout(() => searchInput.focus(), 260); // after width transition
      }

      function closeSearch() {
        searchContainer.classList.remove('open');
        searchResultsWrap.classList.remove('has-results');
        searchInput.value = '';
        searchResults.innerHTML = '';
      }

      function toggleSearch() {
        if (searchContainer.classList.contains('open')) closeSearch();
        else openSearch();
      }

      btnSearch.addEventListener('click', (e) => {
        e.stopPropagation();
        openSearch();
      });

      document.getElementById('search-close-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        closeSearch();
      });

      // Close search when clicking outside
      document.addEventListener('click', (e) => {
        if (!searchContainer.classList.contains('open')) return;
        if (!searchContainer.contains(e.target)) {
          closeSearch();
        }
      });

      // Prevent panel clicks from closing
      searchContainer.addEventListener('click', (e) => e.stopPropagation());

      // Build safe HTML with <mark> highlights (XSS-safe: uses textContent for non-match parts)
      function buildHighlightedEl(text, query) {
        const frag = document.createDocumentFragment();
        if (!query) {
          frag.appendChild(document.createTextNode(text));
          return frag;
        }
        const regex = new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
        const parts = text.split(regex);
        parts.forEach(part => {
          if (part.toLowerCase() === query.toLowerCase()) {
            const mark = document.createElement('mark');
            mark.textContent = part;
            frag.appendChild(mark);
          } else {
            frag.appendChild(document.createTextNode(part));
          }
        });
        return frag;
      }

      // Live search on input (debounced)
      let searchTimer = null;
      searchInput.addEventListener('input', () => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => {
          const query = searchInput.value.trim().toLowerCase();
          searchResults.innerHTML = '';
          if (!query) {
            searchResultsWrap.classList.remove('has-results');
            return;
          }

          const allMatches = Object.values(nodeMap)
            .filter(e => e.text.toLowerCase().includes(query));
          const matches = allMatches.slice(0, 20);

          searchResultsWrap.classList.add('has-results');

          if (matches.length === 0) {
            searchResults.innerHTML = '<li class="search-no-result">找不到相關節點</li>';
            return;
          }

          matches.forEach(entry => {
            const li = document.createElement('li');
            const textDiv = document.createElement('div');
            textDiv.className = 'search-result-text';
            textDiv.appendChild(buildHighlightedEl(entry.text, query));
            li.appendChild(textDiv);

            const pathText = entry.pathParts.slice(0, -1).join(' › ');
            if (pathText) {
              const pathDiv = document.createElement('div');
              pathDiv.className = 'search-result-path';
              pathDiv.textContent = pathText;
              li.appendChild(pathDiv);
            }

            li.addEventListener('click', () => navigateToNode(entry));
            searchResults.appendChild(li);
          });

          // Show truncation hint
          if (allMatches.length > 20) {
            const hint = document.createElement('li');
            hint.className = 'search-no-result';
            hint.textContent = '顯示前 20 筆，共 ' + allMatches.length + ' 筆結果';
            searchResults.appendChild(hint);
          }
        }, 150);
      });

      // Keyboard navigation in search results
      searchInput.addEventListener('keydown', (e) => {
        const items = searchResults.querySelectorAll('li:not(.search-no-result)');
        if (!items.length) return;
        const current = searchResults.querySelector('li.active');
        let idx = current ? Array.from(items).indexOf(current) : -1;

        if (e.key === 'ArrowDown') {
          e.preventDefault();
          if (current) current.classList.remove('active');
          idx = (idx + 1) % items.length;
          items[idx].classList.add('active');
          items[idx].scrollIntoView({ block: 'nearest' });
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          if (current) current.classList.remove('active');
          idx = idx <= 0 ? items.length - 1 : idx - 1;
          items[idx].classList.add('active');
          items[idx].scrollIntoView({ block: 'nearest' });
        } else if (e.key === 'Enter') {
          e.preventDefault();
          if (current) current.click();
          else if (items.length > 0) items[0].click();
        }
      });

      // Unfold all ancestors of a target node in the markmap tree
      function unfoldToNode(targetNode, currentNode) {
        if (currentNode === targetNode) return true;
        if (!currentNode.children) return false;
        for (const child of currentNode.children) {
          if (unfoldToNode(targetNode, child)) {
            if (!currentNode.payload) currentNode.payload = {};
            currentNode.payload.fold = 0;
            return true;
          }
        }
        return false;
      }

      // Find the SVG DOM element by matching d3 __data__.data reference (works with KaTeX)
      function findSvgNodeElement(targetINode) {
        const allNodes = svg.querySelectorAll('.markmap-node');
        for (const el of allNodes) {
          const d3node = el.__data__;
          if (d3node && d3node.data === targetINode) return el;
        }
        return null;
      }

      // Navigate to a node: unfold, zoom, highlight
      function navigateToNode(entry) {
        // Close search panel
        closeSearch();

        // Unfold ancestors — then renderData (NOT setData, which resets fold states via initializeData)
        unfoldToNode(entry.node, root);
        mm.renderData();

        setTimeout(() => {
          attachNodeClickHandlers();

          const targetEl = findSvgNodeElement(entry.node);
          if (targetEl) {
            // Parse transform to get node position
            const transform = targetEl.getAttribute('transform');
            const m = transform && transform.match(/translate\(([-\d.e]+)[,\s]+([-\d.e]+)\)/);
            if (m) {
              const tx = parseFloat(m[1]);
              const ty = parseFloat(m[2]);
              const svgRect = svg.getBoundingClientRect();
              const scale = 1.5;
              const x = svgRect.width / 2 - tx * scale;
              const y = svgRect.height / 2 - ty * scale;
              const t = d3.zoomIdentity.translate(x, y).scale(scale);
              // Use Markmap's internal zoom behavior
              try {
                mm.svg.transition().duration(500).call(mm.zoom.transform, t);
              } catch(err) {
                // Fallback: reset to fit all nodes
                mm.fit();
              }
            }

            // Highlight animation (1.8s = 0.6s × 3 iterations)
            targetEl.classList.add('search-highlight');
            setTimeout(() => targetEl.classList.remove('search-highlight'), 1800);
          }

          // Open sidebar for depth >= 2
          if (entry.depth >= 2) {
            openSidebar(entry);
          }
        }, 500);
      }

      // Keyboard shortcuts
      document.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
          e.preventDefault();
          toggleSearch();
        }
        if (e.key === 'Escape' && searchContainer.classList.contains('open')) {
          closeSearch();
          searchInput.blur();
        }
      });

    })();
  </script>
</body>
</html>
